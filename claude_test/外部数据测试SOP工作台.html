<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外部数据测试 SOP 工作台</title>
<style>
:root{
  --page:#f4f4f1;--surface:#fcfcfb;--surface-2:#fff;--surface-3:#f7f6f2;
  --ink:#0b0b0b;--ink-2:#52514e;--muted:#898781;--hairline:#e1e0d9;
  --brand:#2a78d6;--brand-ink:#1c5cab;--brand-soft:#eaf1fb;
  --good:#0ca30c;--good-soft:#e6f6e6;--warn:#fab219;--warn-soft:#fdf3d8;--crit:#d03b3b;--crit-soft:#f9e2e2;
  --c1:#2a78d6;--c2:#1baf7a;--c5:#4a3aa7;--c6:#e34948;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 12px rgba(16,24,40,.06);
  --radius:12px;--radius-sm:8px;font-variant-numeric:tabular-nums;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--page);color:var(--ink);line-height:1.55}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--hairline);padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{display:flex;gap:10px;align-items:center;padding:6px 8px 16px}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--c5));color:#fff;display:grid;place-items:center;font-weight:700}
.brand .t{font-size:14px;font-weight:700}.brand .s{font-size:11px;color:var(--ink-2)}
.nav-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;padding:14px 10px 6px}
.nav-item{display:flex;gap:10px;align-items:center;padding:9px 11px;border-radius:8px;color:var(--ink-2);font-size:14px;font-weight:600;margin-bottom:3px;cursor:pointer;border:1px solid transparent}
.nav-item:hover{background:var(--surface-3);color:var(--ink)}
.nav-item.active{background:var(--brand-soft);color:var(--brand-ink);border-color:color-mix(in srgb,var(--brand) 22%,transparent)}
.nav-item .num{width:22px;height:22px;border-radius:6px;background:var(--surface-3);border:1px solid var(--hairline);display:grid;place-items:center;font-size:12px}
.nav-item.active .num{background:var(--brand);color:#fff;border-color:transparent}
.main{min-width:0}.topbar{position:sticky;top:0;z-index:5;background:color-mix(in srgb,var(--page) 88%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--hairline);padding:14px 28px;display:flex;justify-content:space-between;gap:16px;align-items:center}
.topbar h1{font-size:17px;margin:0}.topbar .sub{font-size:12px;color:var(--ink-2)}
.status{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;border:1px solid var(--hairline);background:var(--surface)}
.status.ok{background:var(--good-soft);color:var(--good);border-color:color-mix(in srgb,var(--good) 30%,transparent)}
.status.warn{background:var(--warn-soft);color:#9a6b00;border-color:color-mix(in srgb,var(--warn) 35%,transparent)}
.content{padding:26px 28px 80px;max-width:1180px}
.view-h{font-size:22px;margin:0 0 4px}.view-d{font-size:13px;color:var(--ink-2);margin:0 0 22px}
.card{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);padding:20px;margin-bottom:18px;box-shadow:var(--shadow)}
.card-h{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:14px}.card-h h3{font-size:15px;margin:0}.tag{font-size:11px;color:var(--muted)}
.grid{display:grid;gap:14px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:980px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.g2,.g3,.g4{grid-template-columns:1fr}.content{padding:18px}.topbar{align-items:flex-start;flex-direction:column}}
.tile{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);padding:16px}.tlbl{font-size:12px;color:var(--ink-2);font-weight:700;margin-bottom:6px}.tval{font-size:30px;line-height:1;font-weight:750}.u{font-size:14px;color:var(--ink-2);margin-left:3px}.tdelta{font-size:12px;color:var(--ink-2);margin-top:8px}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--hairline);border-radius:999px;padding:3px 10px;font-size:12px;font-weight:700}.chip.good{background:var(--good-soft);color:var(--good)}.chip.warn{background:var(--warn-soft);color:#9a6b00}.chip.crit{background:var(--crit-soft);color:var(--crit)}.chip.brand{background:var(--brand-soft);color:var(--brand-ink)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:8px;border:1px solid var(--hairline);background:var(--surface-2);color:var(--ink);font-size:13px;font-weight:700;cursor:pointer}
.btn:hover{background:var(--surface-3)}.btn.primary{background:var(--brand);color:#fff;border-color:transparent}.btn.primary:hover{background:var(--brand-ink)}.btn:disabled{opacity:.45;cursor:not-allowed}.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}
.upload-zone{border:2px dashed color-mix(in srgb,var(--brand) 42%,transparent);border-radius:var(--radius);background:var(--surface-3);padding:30px 22px;text-align:center;cursor:pointer}.upload-zone.drag,.upload-zone:hover{background:var(--brand-soft);border-color:var(--brand)}.upload-zone .ic{font-size:32px;font-weight:700}.upload-zone .tt{font-size:14px;font-weight:750}.upload-zone .ds{font-size:12px;color:var(--ink-2);margin-top:4px}
label{font-size:13px;font-weight:700;display:block;margin-bottom:6px}.select,.input{width:100%;padding:8px 10px;border-radius:7px;border:1px solid var(--hairline);background:var(--surface-2);color:var(--ink);font-size:13px}.select:focus,.input:focus{outline:2px solid var(--brand);border-color:var(--brand)}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--hairline)}th{font-size:11.5px;text-transform:uppercase;color:var(--muted);background:var(--surface-3)}td.num,th.num{text-align:right}.mono{font-family:ui-monospace,Consolas,monospace;font-size:12.5px}.preview{overflow:auto;max-height:360px;border:1px solid var(--hairline);border-radius:8px}.preview td,.preview th{white-space:nowrap;max-width:240px;overflow:hidden;text-overflow:ellipsis}
.note{font-size:12px;color:var(--ink-2);background:var(--brand-soft);border:1px solid color-mix(in srgb,var(--brand) 18%,transparent);border-radius:8px;padding:10px 13px}.error{background:var(--crit-soft);border-color:color-mix(in srgb,var(--crit) 30%,transparent);color:var(--crit)}
.chart-wrap{position:relative;width:100%}.chart-wrap svg{display:block;width:100%;height:auto;overflow:visible}.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}.legend .li{display:flex;gap:7px;align-items:center;font-size:12px;color:var(--ink-2)}.sw{width:14px;height:8px;border-radius:2px}
.report{background:#fff;border:1px solid var(--hairline);border-radius:var(--radius);padding:30px 34px;color:#111}.report h2{font-size:18px;margin:0 0 8px}.report h3{font-size:14px;margin:18px 0 6px;border-left:3px solid var(--brand);padding-left:9px}.report p,.report li{font-size:13px;color:#333}.report ul{padding-left:20px}.muted{color:var(--muted)}
.spinner{width:14px;height:14px;border:2px solid var(--hairline);border-top-color:var(--brand);border-radius:50%;display:inline-block;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
@media print{.sidebar,.topbar,.toolbar,.no-print{display:none!important}.app{display:block}.content{padding:0;max-width:none}body{background:#fff}.report{border:0;box-shadow:none}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">ED</div><div><div class="t">外部数据测试</div><div class="s">后端分析工作台</div></div></div>
    <div class="nav-label">流程</div>
    <div class="nav-item active" data-view="upload"><span class="num">1</span><span>上传数据</span></div>
    <div class="nav-item" data-view="analyze"><span class="num">2</span><span>效果评估</span></div>
    <div class="nav-item" data-view="report"><span class="num">3</span><span>智能报告</span></div>
    <div class="nav-label">安全边界</div>
    <div class="note">原始数据只提交给本地后端。外部智能 API 只接收聚合指标，不发送客户明细。</div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div><h1>外部数据测试标准作业流程（SOP）</h1><div class="sub">前端上传交互 → 后端解析分析 → 可选 API 智能报告</div></div>
      <div id="server-status" class="status warn">未连接后端</div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
const $=(s,p=document)=>p.querySelector(s);
const $$=(s,p=document)=>[...p.querySelectorAll(s)];
const state={view:"upload",dataset:null,analysis:null,report:null,qualityMetrics:[],apiConfig:null,apiDocument:null,busy:false,error:"",savingConfig:false,testingConfig:false,testQuestion:"接口是否可用？",testReply:""};

function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function fmtPct(v){return `${Number(v||0).toFixed(1)}%`;}
function setBusy(flag){state.busy=flag;renderStatus();}
function renderStatus(){
  const el=$("#server-status");
  if(state.busy){el.className="status warn";el.innerHTML='<span class="spinner"></span>后端处理中';return;}
  if(state.dataset){el.className="status ok";el.textContent=`已连接 · ${state.dataset.rows.toLocaleString()} 行`;return;}
  if(state.apiConfig){
    el.className=state.apiConfig.api_url_configured?"status ok":"status warn";
    el.textContent=`${state.apiConfig.api_type} · ${state.apiConfig.model}`;
    return;
  }
  el.className="status warn";el.textContent="等待后端配置";
}
function getActiveProfileName(){
  return state.apiDocument?.active || "ccswitch";
}
function getProfileDocument(){
  const doc=state.apiDocument||{};
  const profiles=doc.profiles||{};
  const active=getActiveProfileName();
  return profiles[active]||{};
}
function collectConfigDocument(){
  const doc=state.apiDocument||{active:"ccswitch",profiles:{}};
  const active=$("#cfg-active")?.value||doc.active||"ccswitch";
  const profiles=JSON.parse(JSON.stringify(doc.profiles||{}));
  if(!profiles[active]) profiles[active]={};
  const profile=profiles[active];
  profile.api_type=$("#cfg-api-type")?.value||profile.api_type||"anthropic";
  profile.api_url=$("#cfg-api-url")?.value||profile.api_url||"";
  profile.request_url=profile.api_url;
  profile.base_url=$("#cfg-base-url")?.value||profile.base_url||"";
  profile.api_key=$("#cfg-api-key")?.value||profile.api_key||"";
  profile.auth_token=$("#cfg-auth-token")?.value||profile.auth_token||"";
  profile.model=$("#cfg-model")?.value||profile.model||"";
  profile.timeout_seconds=Number($("#cfg-timeout")?.value||profile.timeout_seconds||60);
  profile.temperature=Number($("#cfg-temperature")?.value||profile.temperature||0.2);
  profile.max_tokens=Number($("#cfg-max-tokens")?.value||profile.max_tokens||4096);
  const ccswitchPath=$("#cfg-ccswitch-path")?.value||profile.ccswitch?.config_path||"";
  const ccswitchProfile=$("#cfg-ccswitch-profile")?.value||profile.ccswitch?.profile||"";
  profile.ccswitch={enabled:profile.api_type==="ccswitch",config_path:ccswitchPath,profile:ccswitchProfile};
  profiles[active]=profile;
  return {active,profiles};
}
async function api(path,options={}){
  const resp=await fetch(path,options);
  const data=await resp.json().catch(()=>({ok:false,error:"后端返回非 JSON 响应"}));
  if(!resp.ok||data.ok===false) throw new Error(data.error||`HTTP ${resp.status}`);
  return data;
}
function goto(view){state.view=view;render();}

function render(){
  $$(".nav-item").forEach(item=>item.classList.toggle("active",item.dataset.view===state.view));
  const c=$("#content");
  c.innerHTML=state.view==="upload"?renderUpload():state.view==="analyze"?renderAnalyze():renderReportView();
  bindConfigEvents();
  if(state.view==="upload") afterUpload();
  if(state.view==="analyze") afterAnalyze();
  if(state.view==="report") afterReport();
  renderStatus();
}

function renderError(){return state.error?`<div class="note error">${esc(state.error)}</div>`:"";}
function mappingValue(key){return state.dataset?.mapping?.[key]||"";}

function renderUpload(){
  return `
  <h2 class="view-h">① 上传外部数据</h2>
  <p class="view-d">上传 CSV 或 XLSX 文件。后端负责解析数据、推荐字段映射，前端只展示预览和交互控件。</p>
  ${renderError()}
  ${renderApiConfig()}
  <div class="card">
    <div class="card-h"><h3>文件上传</h3><span class="tag">CSV / XLSX</span></div>
    <div class="upload-zone" id="upload-zone">
      <input id="file-input" type="file" accept=".csv,.xlsx,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" hidden>
      <div class="ic">+</div>
      <div class="tt">点击选择文件，或拖拽文件到这里</div>
      <div class="ds">第一行应为字段名；如果第二行是中文字段说明，后端会自动识别并排除。</div>
      <div style="margin-top:12px"><span class="chip brand">本地后端解析</span><span class="chip brand">不暴露密钥</span></div>
    </div>
  </div>
  ${state.dataset?renderDatasetPanel():""}
  `;
}
function renderApiConfig(){
  if(!state.apiDocument) return "";
  return `<div class="card">
    <div class="card-h"><h3>API 配置</h3><span class="tag">${esc((state.apiConfig||{}).source||"")}</span></div>
    <div class="toolbar" style="margin:0">
      <button class="btn primary" type="button" onclick="window.location.href='api_settings.html'">打开设置</button>
      <span class="note" style="margin:0">请求地址、API Key、模型与连通性测试已拆到独立页面。</span>
    </div>
  </div>`;
  const c=state.apiConfig||{};
  const doc=state.apiDocument||{active:"ccswitch",profiles:{}};
  const profiles=doc.profiles||{};
  const defaults=["ccswitch","anthropic","openai_compatible","zhipu"];
  const profileNames=Array.from(new Set([...defaults,...Object.keys(profiles)]));
  const active=profiles[doc.active]?doc.active:(profileNames[0]||"ccswitch");
  const profile=profiles[active]||{};
  const apiType=profile.api_type||c.api_type||"anthropic";
  const apiUrl=profile.api_url||profile.request_url||c.api_url||"";
  const baseUrl=profile.base_url||c.base_url||"";
  const apiKey=profile.api_key||c.api_key||"";
  const authToken=profile.auth_token||c.auth_token||"";
  const model=profile.model||c.model||"";
  const timeoutSeconds=profile.timeout_seconds??c.timeout_seconds??60;
  const temperature=profile.temperature??c.temperature??0.2;
  const maxTokens=profile.max_tokens??c.max_tokens??4096;
  const ccswitch=profile.ccswitch||{};
  return `<div class="card">
    <div class="card-h"><h3>API 配置</h3><span class="tag">${esc(c.source||"")}</span></div>
    <div class="grid g2">
      <div>
        <label>当前 Profile</label>
        <select id="cfg-active" class="select">
          ${profileNames.map(name=>`<option value="${esc(name)}" ${name===active?"selected":""}>${esc(name)}</option>`).join("")}
        </select>
      </div>
      <div>
        <label>API 类型</label>
        <select id="cfg-api-type" class="select">
          ${["anthropic","openai","ccswitch","zhipu"].map(v=>`<option value="${esc(v)}" ${v===apiType?"selected":""}>${esc(v)}</option>`).join("")}
        </select>
      </div>
      <div>
        <label>请求地址</label>
        <input id="cfg-api-url" class="input" value="${esc(apiUrl)}" placeholder="https://.../v1/messages">
      </div>
      <div>
        <label>Base URL</label>
        <input id="cfg-base-url" class="input" value="${esc(baseUrl)}" placeholder="https://api.anthropic.com">
      </div>
      <div>
        <label>API Key</label>
        <input id="cfg-api-key" class="input" value="${esc(apiKey)}" placeholder="sk-...">
      </div>
      <div>
        <label>Auth Token</label>
        <input id="cfg-auth-token" class="input" value="${esc(authToken)}" placeholder="Bearer token">
      </div>
      <div>
        <label>模型</label>
        <input id="cfg-model" class="input" value="${esc(model)}" placeholder="claude-3-5-sonnet-20241022">
      </div>
      <div>
        <label>超时(秒)</label>
        <input id="cfg-timeout" class="input" type="number" min="1" value="${esc(timeoutSeconds)}">
      </div>
      <div>
        <label>Temperature</label>
        <input id="cfg-temperature" class="input" type="number" min="0" max="2" step="0.1" value="${esc(temperature)}">
      </div>
      <div>
        <label>Max tokens</label>
        <input id="cfg-max-tokens" class="input" type="number" min="1" value="${esc(maxTokens)}">
      </div>
      <div>
        <label>ccswitch 配置路径</label>
        <input id="cfg-ccswitch-path" class="input" value="${esc(ccswitch.config_path||"")}" placeholder="E:/.../ccswitch.json">
      </div>
      <div>
        <label>ccswitch Profile</label>
        <input id="cfg-ccswitch-profile" class="input" value="${esc(ccswitch.profile||"")}" placeholder="profile name">
      </div>
    </div>
    <div class="toolbar" style="margin-top:16px">
      <button class="btn primary" id="save-config-btn">${state.savingConfig?'<span class="spinner"></span> 保存中':'保存配置'}</button>
      <button class="btn" id="refresh-config-btn">刷新配置</button>
    </div>
    <div class="note">保存后会写回后端 api_config.json，并立即影响报告生成时调用的模型与地址。</div>
  </div>`;
}

function renderDatasetPanel(){
  const d=state.dataset;
  const headers=d.headers||[];
  const numeric=(d.numericColumns||[]).map(c=>c.name);
  const previewHeaders=headers.slice(0,12);
  return `
  <div class="card">
    <div class="card-h"><h3>字段映射</h3><span class="tag">${esc(d.fileName)} · ${d.rows.toLocaleString()} 行 · ${d.cols} 列</span></div>
    <div class="grid g2">
      <div><label>Y 标签字段</label><select id="map-y" class="select">${headers.map(h=>`<option value="${esc(h)}" ${h===mappingValue("yCol")?"selected":""}>${esc(label(h))}</option>`).join("")}</select></div>
      <div><label>坏样本取值</label><input id="map-bad" class="input" value="${esc(mappingValue("badValue"))}" list="bad-options"></div>
      <div><label>查得/命中标识</label><select id="map-query" class="select"><option value="">不使用</option>${headers.map(h=>`<option value="${esc(h)}" ${h===mappingValue("queryFlagCol")?"selected":""}>${esc(label(h))}</option>`).join("")}</select></div>
      <div><label>核心分析变量</label><select id="map-var" class="select">${(numeric.length?numeric:headers).map(h=>`<option value="${esc(h)}" ${h===mappingValue("variableCol")?"selected":""}>${esc(label(h))}</option>`).join("")}</select></div>
    </div>
    <datalist id="bad-options">${(d.badValueOptions||[]).map(v=>`<option value="${esc(v)}"></option>`).join("")}</datalist>
    <div class="toolbar" style="margin-top:16px"><button class="btn primary" id="analyze-btn">开始后端分析</button></div>
  </div>
  <div class="card">
    <div class="card-h"><h3>数据预览</h3><span class="tag">前 12 行 / 前 12 列</span></div>
    <div class="preview"><table>
      <thead><tr>${previewHeaders.map(h=>`<th>${esc(h)}</th>`).join("")}</tr></thead>
      <tbody>${(d.preview||[]).map(row=>`<tr>${previewHeaders.map(h=>`<td>${esc(row[h])}</td>`).join("")}</tr>`).join("")}</tbody>
    </table></div>
  </div>`;
}
function label(h){const desc=state.dataset?.descriptions?.[h];return desc?`${h}（${desc}）`:h;}
function collectMapping(){
  return {
    yCol:$("#map-y")?.value||mappingValue("yCol"),
    badValue:$("#map-bad")?.value||mappingValue("badValue"),
    queryFlagCol:$("#map-query")?.value||"",
    variableCol:$("#map-var")?.value||mappingValue("variableCol"),
  };
}
function afterUpload(){
  const zone=$("#upload-zone"),input=$("#file-input");
  if(zone&&input){
    zone.onclick=()=>input.click();
    input.onchange=()=>uploadFile(input.files[0]);
    zone.ondragover=e=>{e.preventDefault();zone.classList.add("drag");};
    zone.ondragleave=()=>zone.classList.remove("drag");
    zone.ondrop=e=>{e.preventDefault();zone.classList.remove("drag");uploadFile(e.dataTransfer.files[0]);};
  }
  $("#analyze-btn")?.addEventListener("click",analyze);
}
async function uploadFile(file){
  if(!file) return;
  state.error="";
  setBusy(true);
  try{
    const form=new FormData();
    form.append("file",file);
    const data=await api("/api/upload",{method:"POST",body:form});
    state.dataset=data;
    state.analysis=null;
    state.report=null;
    state.view="upload";
  }catch(err){state.error=err.message;}
  finally{setBusy(false);render();}
}
async function analyze(){
  if(!state.dataset) return;
  state.error="";
  state.dataset.mapping=collectMapping();
  setBusy(true);
  try{
    const data=await api("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({datasetId:state.dataset.datasetId,mapping:state.dataset.mapping})});
    state.analysis=data.analysis;
    state.qualityMetrics=data.qualityMetrics||[];
    state.report=null;
    state.view="analyze";
  }catch(err){state.error=err.message;}
  finally{setBusy(false);render();}
}

function renderAnalyze(){
  if(!state.analysis){
    return `<h2 class="view-h">② 效果评估</h2><p class="view-d">请先上传数据并点击“开始后端分析”。</p>${renderError()}${renderApiConfig()}<div class="toolbar"><button class="btn primary" onclick="goto('upload')">返回上传</button></div>`;
  }
  const a=state.analysis,s=a.sample;
  return `
  <h2 class="view-h">② 效果评估</h2>
  <p class="view-d">以下结果全部由后端 API 返回，前端只负责展示。</p>
  ${renderError()}
  ${renderApiConfig()}
  <div class="grid g4">
    <div class="tile"><div class="tlbl">样本量</div><div class="tval">${s.total.toLocaleString()}</div><div class="tdelta">${s.total>=5000?'<span class="chip good">达标</span>':'<span class="chip crit">不足 5000</span>'}</div></div>
    <div class="tile"><div class="tlbl">坏样本</div><div class="tval">${s.totalBad.toLocaleString()}</div><div class="tdelta">占比 ${fmtPct(s.badPct)}</div></div>
    <div class="tile"><div class="tlbl">分析变量</div><div class="tval" style="font-size:18px">${esc(a.mapping.variableCol)}</div><div class="tdelta">后端按该字段计算</div></div>
    <div class="tile"><div class="tlbl">数据文件</div><div class="tval" style="font-size:18px">${esc(a.dataset.fileName)}</div><div class="tdelta">${a.dataset.rows.toLocaleString()} 行 · ${a.dataset.cols} 列</div></div>
  </div>
  <div class="card"><div class="card-h"><h3>3-A · 数据质量</h3><span class="tag">后端计算</span></div>${renderQuality(a)}</div>
  <div class="card"><div class="card-h"><h3>3-B · 策略效果</h3><span class="tag">分箱与 Cutoff</span></div>
    <div class="chart-wrap" id="binning-chart"></div>
    <div style="height:18px"></div>
    <div class="chart-wrap" id="cutoff-chart"></div>
    ${renderCutoffTable(a)}
  </div>
  <div class="card"><div class="card-h"><h3>3-C · 模型入模评估</h3><span class="tag">IV / KS / AUC / PSI</span></div><div class="grid g4">${renderModelTiles(a)}</div></div>
  <div class="toolbar"><button class="btn primary" id="report-btn">调用 API 生成报告</button><button class="btn" onclick="goto('upload')">调整映射</button></div>`;
}
function renderQuality(a){
  return `<table><thead><tr><th>指标</th><th class="num">实测值</th><th>标准</th><th>判定</th></tr></thead><tbody>${state.qualityMetrics.map(m=>{
    const v=a.quality[m.key]??0;
    return `<tr><td>${esc(m.name)}</td><td class="num">${fmtPct(v)}</td><td>${esc(m.std)}</td><td>${esc(a.qualityJudgement[m.key]||"")}</td></tr>`;
  }).join("")}</tbody></table>`;
}
function renderCutoffTable(a){
  const rows=a.cutoffRules||[];
  if(!rows.length) return `<div class="note">所选变量没有可用阈值，无法生成 Cutoff。</div>`;
  return `<table style="margin-top:18px"><thead><tr><th>规则</th><th class="num">拒绝线</th><th class="num">拒绝率</th><th class="num">召回率</th><th class="num">精准率</th><th class="num">误杀率</th><th>结论</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="mono">${esc(r.rule)}</td><td class="num">${esc(r.t)}</td><td class="num">${r.rej}%</td><td class="num">${r.recall}%</td><td class="num">${r.prec}%</td><td class="num">${r.kill}%</td><td>${r.level==="recommend"?'<span class="chip good">推荐</span> ':""}${esc(r.verdict)}</td></tr>`).join("")}</tbody></table>`;
}
function renderModelTiles(a){
  return (a.modelMetrics||[]).map(m=>{
    const cls=m.status==="good"?"good":m.status==="crit"?"crit":"warn";
    return `<div class="tile"><div class="tlbl">${esc(m.name)}</div><div class="tval">${esc(m.display)}<span class="u">${esc(m.unit)}</span></div><div class="tdelta"><span class="chip ${cls}">${m.status==="good"?"建议入模":"需复核"}</span></div><div class="tdelta">${esc(m.advice)}</div></div>`;
  }).join("");
}
function afterAnalyze(){
  if(!state.analysis) return;
  drawBinningChart($("#binning-chart"),state.analysis.binning);
  drawCutoffChart($("#cutoff-chart"),state.analysis.cutoffRules);
  $("#report-btn")?.addEventListener("click",generateReport);
}

async function generateReport(){
  if(!state.dataset) return;
  if(!state.analysis) await analyze();
  state.error="";
  setBusy(true);
  try{
    const data=await api("/api/ai-report",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({datasetId:state.dataset.datasetId,mapping:state.dataset.mapping})});
    state.report=data.report;
    state.analysis=data.analysis;
    state.view="report";
  }catch(err){state.error=err.message;}
  finally{setBusy(false);render();}
}
function renderReportView(){
  if(!state.analysis){
    return `<h2 class="view-h">③ 智能报告</h2><p class="view-d">请先完成后端分析。</p>${renderError()}${renderApiConfig()}<div class="toolbar"><button class="btn primary" onclick="goto('upload')">返回上传</button></div>`;
  }
  const report=state.report;
  return `
  <h2 class="view-h">③ 智能报告</h2>
  <p class="view-d">报告由后端生成。配置 AI API 时调用外部接口；未配置时使用本地规则报告。</p>
  ${renderError()}
  ${renderApiConfig()}
  ${report?`<div class="note ${report.source==="api"?"":"warn"}">报告来源：${report.source==="api"?"外部智能分析 API":"本地规则生成"}${report.aiError?` · ${esc(report.aiError)}`:""}</div>`:""}
  <div class="toolbar no-print"><button class="btn primary" id="make-report">${report?"重新生成报告":"调用 API 生成报告"}</button><button class="btn" onclick="window.print()" ${report?"":"disabled"}>打印 / 导出 PDF</button><button class="btn" onclick="goto('analyze')">返回评估</button></div>
  ${report?`<div class="report">${report.html}</div>`:`<div class="card"><div class="note">尚未生成报告。</div></div>`}`;
}
function afterReport(){$("#make-report")?.addEventListener("click",generateReport);}

function drawBinningChart(wrap,binning){
  if(!wrap) return;
  if(!binning||!binning.bins?.length){wrap.innerHTML='<div class="note">无法生成分箱图。</div>';return;}
  const bins=binning.bins,W=720,H=300,pad={t:18,r:18,b:46,l:42},plotW=W-pad.l-pad.r,plotH=H-pad.t-pad.b;
  const max=Math.max(10,...bins.map(b=>b.badRate*100))*1.15,bw=plotW/bins.length,barW=Math.min(bw*.5,46);
  let svg=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="坏客户率分箱趋势">`;
  for(let i=0;i<=5;i++){const val=max/5*i,y=pad.t+plotH-(val/max)*plotH;svg+=`<line x1="${pad.l}" x2="${pad.l+plotW}" y1="${y}" y2="${y}" stroke="var(--hairline)"/><text x="${pad.l-8}" y="${y+4}" text-anchor="end" font-size="11" fill="var(--muted)">${val.toFixed(0)}%</text>`;}
  bins.forEach((b,i)=>{const cx=pad.l+bw*(i+.5),val=b.badRate*100,bh=(val/max)*plotH,by=pad.t+plotH-bh;svg+=`<rect x="${cx-barW/2}" y="${by}" width="${barW}" height="${bh}" rx="4" fill="var(--c1)"/><text x="${cx}" y="${by-7}" text-anchor="middle" font-size="12" font-weight="700">${val.toFixed(1)}%</text><text x="${cx}" y="${pad.t+plotH+20}" text-anchor="middle" font-size="12" fill="var(--ink-2)">${esc(b.label)}</text><text x="${cx}" y="${pad.t+plotH+35}" text-anchor="middle" font-size="10.5" fill="var(--muted)">${b.count}条</text>`;});
  const overall=binning.overallBadRate*100,oy=pad.t+plotH-(overall/max)*plotH;svg+=`<line x1="${pad.l}" x2="${pad.l+plotW}" y1="${oy}" y2="${oy}" stroke="var(--c6)" stroke-dasharray="5 4"/><text x="${pad.l+plotW}" y="${oy-6}" text-anchor="end" font-size="11" fill="var(--c6)">整体 ${overall.toFixed(1)}%</text></svg>`;
  wrap.innerHTML=svg;
}
function drawCutoffChart(wrap,rules){
  if(!wrap) return;
  if(!rules||!rules.length){wrap.innerHTML='<div class="note">无法生成 Cutoff 图。</div>';return;}
  const cats=rules.map(r=>"≥"+r.t),series=[["拒绝率","var(--c1)",rules.map(r=>r.rej)],["召回率","var(--c2)",rules.map(r=>r.recall)],["精准率","var(--c5)",rules.map(r=>r.prec)],["误杀率","var(--c6)",rules.map(r=>r.kill)]];
  const W=720,H=320,pad={t:18,r:18,b:46,l:42},plotW=W-pad.l-pad.r,plotH=H-pad.t-pad.b,max=Math.max(10,...series.flatMap(s=>s[2]))*1.15,gw=plotW/cats.length,barW=Math.min(gw*.14,20);
  let svg=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Cutoff 分析">`;
  for(let i=0;i<=5;i++){const val=max/5*i,y=pad.t+plotH-(val/max)*plotH;svg+=`<line x1="${pad.l}" x2="${pad.l+plotW}" y1="${y}" y2="${y}" stroke="var(--hairline)"/><text x="${pad.l-8}" y="${y+4}" text-anchor="end" font-size="11" fill="var(--muted)">${val.toFixed(0)}%</text>`;}
  cats.forEach((cat,gi)=>{const gx=pad.l+gw*gi+gw*.18;series.forEach((s,si)=>{const v=s[2][gi],bh=(v/max)*plotH,by=pad.t+plotH-bh,x=gx+(barW+3)*si;svg+=`<rect x="${x}" y="${by}" width="${barW}" height="${bh}" rx="3" fill="${s[1]}"/>`;});svg+=`<text x="${pad.l+gw*(gi+.5)}" y="${pad.t+plotH+22}" text-anchor="middle" font-size="12" fill="var(--ink-2)">${cat}</text>`;});
  svg+="</svg>";
  wrap.innerHTML=svg+`<div class="legend">${series.map(s=>`<div class="li"><span class="sw" style="background:${s[1]}"></span>${s[0]}</div>`).join("")}</div>`;
}

async function loadConfig(){
  try{
    const data=await api("/api/config");
    state.apiConfig=data.config;
    state.apiDocument=data.document||null;
  }catch(err){
    state.error=`后端配置读取失败：${err.message}`;
  }
  render();
}

function bindConfigEvents(){
  $("#save-config-btn")?.addEventListener("click",saveConfig);
  $("#refresh-config-btn")?.addEventListener("click",loadConfig);
  $("#cfg-active")?.addEventListener("change",()=>{
    state.apiDocument.active=$("#cfg-active").value;
    render();
  });
}

async function saveConfig(){
  state.error="";
  state.savingConfig=true;
  render();
  try{
    const document=collectConfigDocument();
    const data=await api("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({document})});
    state.apiDocument=data.document||document;
    state.apiConfig=data.config||state.apiConfig;
  }catch(err){
    state.error=`配置保存失败：${err.message}`;
  }finally{
    state.savingConfig=false;
    render();
  }
}

render();
loadConfig();
</script>
</body>
</html>
