<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外部数据测试 SOP 工作台</title>
<style>
/* ============ Design tokens (validated dataviz palette) ============ */
:root{
  --page:#f4f4f1; --surface:#fcfcfb; --surface-2:#ffffff; --surface-3:#f7f6f2;
  --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781; --hairline:#e1e0d9; --axis:#c3c2b7;
  --border:rgba(11,11,11,.10);
  --brand:#2a78d6; --brand-ink:#1c5cab; --brand-soft:#eaf1fb;
  /* categorical (light) */
  --c1:#2a78d6; --c2:#1baf7a; --c3:#eda100; --c4:#008300; --c5:#4a3aa7; --c6:#e34948; --c7:#e87ba4; --c8:#eb6834;
  /* status (fixed) */
  --good:#0ca30c; --good-soft:#e6f6e6; --warn:#fab219; --warn-soft:#fdf3d8; --serious:#ec835a; --serious-soft:#fbe9df; --crit:#d03b3b; --crit-soft:#f9e2e2;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 12px rgba(16,24,40,.06);
  --radius:12px; --radius-sm:8px;
  font-variant-numeric:tabular-nums;
}
@media (prefers-color-scheme:dark){
:root{
  --page:#0d0d0d; --surface:#1a1a19; --surface-2:#21211f; --surface-3:#262624;
  --ink:#ffffff; --ink-2:#c3c2b7; --muted:#898781; --hairline:#2c2c2a; --axis:#383835;
  --border:rgba(255,255,255,.10);
  --brand:#3987e5; --brand-ink:#9cc4f5; --brand-soft:#16243a;
  --c1:#3987e5; --c2:#199e70; --c3:#c98500; --c4:#008300; --c5:#9085e9; --c6:#e66767; --c7:#d55181; --c8:#d95926;
  --good:#0ca30c; --good-soft:#0f2410; --warn:#fab219; --warn-soft:#2a2110; --serious:#ec835a; --serious-soft:#2a1c15; --crit:#d03b3b; --crit-soft:#2a1515;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 16px rgba(0,0,0,.5);
}}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;
  background:var(--page); color:var(--ink); line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

/* ============ Sidebar ============ */
.sidebar{
  background:var(--surface); border-right:1px solid var(--hairline);
  padding:18px 14px; position:sticky; top:0; height:100vh; overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
.brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--c5));display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;flex:none}
.brand .t{font-size:14px;font-weight:700;line-height:1.25}
.brand .s{font-size:11px;color:var(--ink-2);font-weight:500}
.nav-group-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:14px 10px 6px}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--radius-sm);
  cursor:pointer;color:var(--ink-2);font-size:14px;font-weight:500;margin-bottom:2px;border:1px solid transparent;
  transition:background .12s,color .12s;
}
.nav-item .num{width:22px;height:22px;border-radius:6px;background:var(--surface-3);display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--ink-2);flex:none;border:1px solid var(--hairline)}
.nav-item:hover{background:var(--surface-3);color:var(--ink)}
.nav-item.active{background:var(--brand-soft);color:var(--brand-ink);border-color:color-mix(in srgb,var(--brand) 22%,transparent)}
.nav-item.active .num{background:var(--brand);color:#fff;border-color:transparent}
.nav-item .done{margin-left:auto;width:16px;height:16px;border-radius:50%;border:2px solid var(--hairline);flex:none}
.nav-item.is-done .done{background:var(--good);border-color:var(--good);position:relative}
.nav-item.is-done .done::after{content:"";position:absolute;left:4px;top:1px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}

/* ============ Main ============ */
.main{min-width:0}
.topbar{
  position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--page) 86%,transparent);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--hairline);
  padding:14px 28px; display:flex;align-items:center;gap:18px;flex-wrap:wrap;
}
.topbar h1{font-size:17px;margin:0;font-weight:700}
.topbar .sub{font-size:12px;color:var(--ink-2)}
.stepper{display:flex;align-items:center;gap:0;margin-left:auto;flex-wrap:wrap}
.step{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-2);cursor:pointer;padding:4px 8px;border-radius:6px}
.step .dot{width:20px;height:20px;border-radius:50%;background:var(--surface-3);border:1px solid var(--hairline);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--ink-2);flex:none}
.step.active{color:var(--brand-ink)}
.step.active .dot{background:var(--brand);color:#fff;border-color:transparent}
.step.done .dot{background:var(--good);color:#fff;border-color:transparent}
.step-arrow{color:var(--axis);margin:0 2px;font-size:12px}

.content{padding:26px 28px 80px;max-width:1180px}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.view-h{font-size:22px;font-weight:700;margin:0 0 4px}
.view-d{color:var(--ink-2);font-size:13px;margin:0 0 22px}

/* ============ Cards & primitives ============ */
.card{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:18px}
.card-h{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.card-h h3{margin:0;font-size:15px;font-weight:700}
.card-h .tag{font-size:11px;color:var(--muted);font-weight:500}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:980px){.g2,.g3,.g4{grid-template-columns:1fr}}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;border:1px solid var(--hairline)}
.chip.good{background:var(--good-soft);color:var(--good);border-color:color-mix(in srgb,var(--good) 30%,transparent)}
.chip.warn{background:var(--warn-soft);color:#9a6b00;border-color:color-mix(in srgb,var(--warn) 40%,transparent)}
.chip.serious{background:var(--serious-soft);color:#b54a1e;border-color:color-mix(in srgb,var(--serious) 35%,transparent)}
.chip.crit{background:var(--crit-soft);color:var(--crit);border-color:color-mix(in srgb,var(--crit) 35%,transparent)}
.chip.brand{background:var(--brand-soft);color:var(--brand-ink);border-color:color-mix(in srgb,var(--brand) 25%,transparent)}

.principle{padding:14px;border-radius:var(--radius-sm);background:var(--surface-3);border:1px solid var(--hairline)}
.principle .k{font-size:13px;font-weight:700;color:var(--brand-ink);margin-bottom:3px}
.principle .v{font-size:12.5px;color:var(--ink-2)}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--hairline)}
th{font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:600;background:var(--surface-3)}
tbody tr:hover{background:var(--surface-3)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.mono{font-family:ui-monospace,"SF Mono",Consolas,monospace;font-size:12.5px}
tr.recommend{background:var(--good-soft)}
tr.recommend td{border-color:color-mix(in srgb,var(--good) 18%,transparent)}
.req-yes{color:var(--good);font-weight:700}
.req-no{color:var(--crit);font-weight:700}

/* checklist */
.check{display:flex;gap:10px;padding:11px 12px;border:1px solid var(--hairline);border-radius:var(--radius-sm);margin-bottom:8px;background:var(--surface);cursor:pointer;transition:background .12s,border-color .12s}
.check:hover{background:var(--surface-3)}
.check input{accent-color:var(--brand);width:17px;height:17px;margin-top:2px;flex:none}
.check.checked{border-color:color-mix(in srgb,var(--good) 30%,transparent);background:var(--good-soft)}
.check .ct{font-size:13px;font-weight:600}
.check .cd{font-size:12px;color:var(--ink-2)}
.check.checked .ct,.check.checked .cd{color:#0a3d0a}
.substep{margin:14px 0}
.substep-h{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.substep-h .n{width:24px;height:24px;border-radius:7px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px;flex:none}
.substep-h .t{font-size:14px;font-weight:700}
.progress{height:6px;background:var(--surface-3);border-radius:99px;overflow:hidden;border:1px solid var(--hairline)}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--c2));border-radius:99px;transition:width .35s ease}

/* meter */
.meter-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.meter-row .lbl{width:120px;font-size:13px;font-weight:600;flex:none}
.meter-track{position:relative;flex:1;height:26px;border-radius:7px;overflow:hidden;display:flex;border:1px solid var(--hairline)}
.meter-track .zone{height:100%}
.meter-track .needle{position:absolute;top:-3px;bottom:-3px;width:3px;background:var(--ink);border-radius:2px;box-shadow:0 0 0 3px var(--surface)}
.meter-val{width:78px;text-align:right;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;flex:none}
.input-num{width:74px;padding:6px 8px;border:1px solid var(--hairline);border-radius:7px;background:var(--surface-2);color:var(--ink);font-size:13px;font-variant-numeric:tabular-nums}
.input-num:focus{outline:2px solid var(--brand);outline-offset:0;border-color:var(--brand)}

/* stat tile */
.tile{padding:16px;border:1px solid var(--hairline);border-radius:var(--radius);background:var(--surface)}
.tile .tlbl{font-size:12px;color:var(--ink-2);font-weight:600;margin-bottom:6px}
.tile .tval{font-size:30px;font-weight:700;line-height:1;letter-spacing:-.01em}
.tile .tval .u{font-size:14px;color:var(--ink-2);font-weight:600;margin-left:3px}
.tile .tdelta{font-size:12px;margin-top:8px;color:var(--ink-2)}
.hero{font-size:46px;font-weight:700;letter-spacing:-.02em;line-height:1}

/* charts */
.chart-wrap{position:relative;width:100%}
.chart-wrap svg{display:block;width:100%;height:auto;overflow:visible}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;padding-left:4px}
.legend .li{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2)}
.legend .sw{width:14px;height:8px;border-radius:2px}
.tooltip{
  position:absolute;pointer-events:none;background:var(--ink);color:#fff;padding:8px 11px;border-radius:8px;
  font-size:12px;line-height:1.5;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;transition:opacity .1s;white-space:nowrap;z-index:30;transform:translate(-50%,-110%)
}
.tooltip b{font-weight:700}
.tooltip .tv{display:flex;justify-content:space-between;gap:14px}
.tooltip .tv i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}
.chart-note{font-size:11.5px;color:var(--muted);margin-top:8px}

/* report */
.report{background:#fff;border:1px solid var(--hairline);border-radius:var(--radius);padding:30px 34px;color:#111}
@media(prefers-color-scheme:dark){.report{background:#fbfbfa;color:#111}}
.report h2{font-size:18px;margin:0 0 4px}
.report h3{font-size:14px;margin:18px 0 6px;border-left:3px solid var(--brand);padding-left:9px}
.report p,.report li{font-size:13px;color:#333}
.report ul{margin:6px 0;padding-left:20px}
.report .meta{font-size:12px;color:#666;margin-bottom:14px}
.report table{font-size:12px}
.kv{display:grid;grid-template-columns:130px 1fr;gap:4px 12px;font-size:13px;margin:8px 0}
.kv b{color:var(--muted);font-weight:600}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:8px;border:1px solid var(--hairline);background:var(--surface-2);color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;transition:background .12s,transform .05s}
.btn:hover{background:var(--surface-3)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn.primary{background:var(--brand);color:#fff;border-color:transparent}
.btn.primary:hover{background:var(--brand-ink)}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}

.flow{display:flex;align-items:stretch;gap:0;flex-wrap:wrap}
.flow-node{flex:1;min-width:180px;padding:16px;border:1px solid var(--hairline);background:var(--surface);border-radius:var(--radius-sm);position:relative}
.flow-node .fn{font-size:11px;font-weight:700;color:var(--brand-ink);letter-spacing:.04em}
.flow-node .ft{font-size:14px;font-weight:700;margin:5px 0 4px}
.flow-node .fd{font-size:11.5px;color:var(--ink-2)}
.flow-arrow{display:grid;place-items:center;padding:0 6px;color:var(--axis);font-size:18px}
@media(max-width:900px){.flow{flex-direction:column}.flow-arrow{transform:rotate(90deg);padding:4px 0}}

.note{font-size:12px;color:var(--ink-2);background:var(--brand-soft);border:1px solid color-mix(in srgb,var(--brand) 18%,transparent);border-radius:var(--radius-sm);padding:10px 13px;margin-top:6px}

@media print{
  .sidebar,.topbar,.toolbar,.nav-item{display:none!important}
  .app{display:block} .content{padding:0;max-width:none}
  .view{display:none!important} .view#print-area{display:block!important}
  body{background:#fff}
}
@media(max-width:760px){
  .app{grid-template-columns:1fr}
  .sidebar{position:static;height:auto}
  .content{padding:18px}
}

/* ============ Upload / data ============ */
.upload-zone{border:2px dashed color-mix(in srgb,var(--brand) 40%,transparent);border-radius:var(--radius);padding:30px 22px;text-align:center;background:var(--surface-3);transition:border-color .15s,background .15s;cursor:pointer}
.upload-zone:hover,.upload-zone.drag{border-color:var(--brand);background:var(--brand-soft)}
.upload-zone .ic{font-size:30px;margin-bottom:6px}
.upload-zone .tt{font-size:14px;font-weight:700}
.upload-zone .ds{font-size:12px;color:var(--ink-2);margin-top:4px;max-width:520px;margin-left:auto;margin-right:auto}
.upload-zone .fmts{display:inline-flex;gap:6px;margin-top:12px}
.data-banner{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:var(--radius-sm);border:1px solid var(--hairline);background:var(--surface);margin-bottom:18px;flex-wrap:wrap}
.data-banner.empty{border-color:color-mix(in srgb,var(--warn) 45%,transparent);background:var(--warn-soft)}
.data-banner.ok{border-color:color-mix(in srgb,var(--good) 35%,transparent);background:var(--good-soft)}
.data-banner .db-ic{font-size:22px;flex:none}
.data-banner .db-t{font-weight:700;font-size:13.5px}
.data-banner .db-s{font-size:12px;color:var(--ink-2);margin-top:1px}
.data-banner .btn{margin-left:auto}
.preview-wrap{overflow:auto;max-height:360px;border:1px solid var(--hairline);border-radius:var(--radius-sm)}
.preview-wrap table{font-size:12px}
.preview-wrap th,.preview-wrap td{white-space:nowrap;padding:6px 9px;max-width:240px;overflow:hidden;text-overflow:ellipsis}
.mapping-row{display:grid;grid-template-columns:170px 1fr;gap:12px;align-items:center;margin-bottom:10px}
.mapping-row label{font-size:13px;font-weight:600}
.select{width:100%;padding:7px 9px;border:1px solid var(--hairline);border-radius:7px;background:var(--surface-2);color:var(--ink);font-size:13px}
.select:focus{outline:2px solid var(--brand);border-color:var(--brand)}
.derived{display:inline-block;font-size:10px;font-weight:700;color:var(--brand-ink);background:var(--brand-soft);padding:1px 7px;border-radius:99px;margin-left:6px;vertical-align:middle}
.empty-state{text-align:center;padding:46px 20px;color:var(--ink-2)}
.empty-state .big{font-size:42px;margin-bottom:10px}
.empty-state .et{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px}
.lock-val{width:74px;text-align:right;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;flex:none}
</style>
</head>
<body>
<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">ED</div>
      <div>
        <div class="t">外部数据测试</div>
        <div class="s">SOP 工作台 v1.0</div>
      </div>
    </div>
    <div class="nav-group-label">测试流程</div>
    <div id="nav"></div>
    <div class="nav-group-label">工具</div>
    <div class="nav-item" data-view="report"><span class="num">5</span><span>测试报告</span><span class="done"></span></div>
    <div style="padding:14px 10px 4px">
      <button class="btn" style="width:100%;justify-content:center" onclick="resetAll()">重置全部数据</button>
    </div>
    <div style="font-size:11px;color:var(--muted);padding:8px 10px;line-height:1.5">
      数据本地存储（localStorage），刷新不丢失。<br>图表调色板已通过 CVD 可访问性校验。
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="main">
    <div class="topbar">
      <div>
        <h1>外部数据测试标准作业流程（SOP）</h1>
        <div class="sub">多头借贷等外部数据 · 样本设计 → 数据清洗 → 效果评估 → 测试报告</div>
      </div>
      <div class="stepper" id="stepper"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<div class="tooltip" id="tooltip"></div>

<script src="xlsx.full.min.js"></script>
<script>
/* ============================================================
   DATA — 源自《外部数据测试流程.docx》
   ============================================================ */
const PRINCIPLES = [
  {k:"代表性", v:"样本应覆盖本行主要信贷产品和客群特征"},
  {k:"充分性", v:"总样本量 ≥ 5000 条，确保统计显著性"},
  {k:"分层性", v:"按 Y 值（好/坏/灰）分层抽样，坏样本占比 ≥ 10%"},
  {k:"时效性", v:"样本申请日期覆盖至少 6 个月，确保贷后表现充分"},
  {k:"回溯一致性", v:"提交三方的回溯日期与样本申请日期严格一致"},
];

const GROUPS = [
  {name:"好客户", pct:70, min:3500, yDef:"DPD<30天，无逾期", use:"训练/验证", color:"var(--good)"},
  {name:"坏客户", pct:20, min:1000, yDef:"DPD≥90天或 M3+",   use:"训练/验证", color:"var(--crit)"},
  {name:"灰客户", pct:10, min:500,  yDef:"DPD30–90天",        use:"测试/观察", color:"var(--warn)"},
];

const EXTRACT_RULES = [
  "申请日期范围：近 12 个月内，确保贷后表现观察期充足",
  "产品覆盖：包含消费贷、经营贷等主要产品",
  "排除标准：排除内部已明确拒绝且未放款的样本（除非测试拒贷规则）",
  "加密要求：身份证号、手机号等敏感信息需 MD5/SHA256 加密后提交",
  "回溯要求：仅选择支持回溯的数据供应商，回溯日期精确到日",
];

const FIELDS = [
  ["apply_no","STRING","是","申请编号（加密主键）"],
  ["id_no_hash","STRING","是","加密身份证号（提交关联键）"],
  ["mobile_hash","STRING","否","加密手机号"],
  ["apply_date","STRING","是","申请日期（回溯日期）"],
  ["product_code","STRING","是","产品代码"],
  ["product_type","STRING","是","产品类型"],
  ["y_label","INT","是","贷后标签：0好/1坏/2灰"],
  ["y_label_detail","STRING","是","详细标签：DPD30+/DPD90+/M3+"],
  ["sample_group","STRING","是","样本分组：train/validation/test"],
  ["internal_decision","STRING","否","内部审批结果"],
  ["internal_reason","STRING","否","内部拒绝原因"],
  ["is_backtrack","INT","是","是否支持回溯：1是 0否"],
];

const CLEAN_STEPS = [
  {n:"步骤1", t:"数据接收与核对", items:[
    "核对返回数据条数与提交样本数是否一致",
    "检查字段完整性，确认所有约定字段均已返回",
    "检查数据格式是否符合约定（编码、分隔符等）",
  ]},
  {n:"步骤2", t:"异常值处理", items:[

function normalizeHeader(v,i,seen){
  let h=cleanValue(v)||`字段${i+1}`;
  if(seen[h]){seen[h]+=1;h=`${h}_${seen[h]}`;}else seen[h]=1;
  return h;
}
function looksLikeDescriptionRow(row,headers){
  if(!row) return false;
  const text=row.map(cleanValue).filter(Boolean);
  if(!text.length) return false;
  const cn=text.filter(v=>/[\u4e00-\u9fa5]/.test(v)).length;
  const numeric=text.filter(v=>toNumber(v)!==null).length;
  return cn>=Math.max(2,Math.floor(headers.length*.25)) && numeric<=Math.max(1,Math.floor(text.length*.15));
}
function normalizeDataset(matrix,fileName,sheetName){
  const rows=(matrix||[]).filter(r=>(r||[]).some(v=>!isBlank(v)));
  if(rows.length<2) throw new Error("文件中没有可分析的数据行。");
  const seen={};
  const headers=rows[0].map((v,i)=>normalizeHeader(v,i,seen));
  let start=1;
  const descriptions={};
  if(looksLikeDescriptionRow(rows[1],headers)){
    rows[1].forEach((v,i)=>{if(headers[i]) descriptions[headers[i]]=cleanValue(v);});
    start=2;
  }
  const dataRows=rows.slice(start).map(r=>{
    const obj={};
    headers.forEach((key,i)=>obj[key]=r[i]??"");
    return obj;
  }).filter(r=>headers.some(key=>!isBlank(r[key])));
  if(!dataRows.length) throw new Error("文件中没有可分析的数据行。");
  return {
    fileName,sheetName:sheetName||"",
    uploadedAt:new Date().toISOString(),
    headers,descriptions,rows:dataRows
  };
}
function parseCSV(text){
  text=String(text||"").replace(/^\uFEFF/,"");
  const rows=[];let row=[],cell="",q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i],next=text[i+1];
    if(q){
      if(ch==='"'&&next==='"'){cell+='"';i++;}
      else if(ch==='"'){q=false;}
      else cell+=ch;
    }else{
      if(ch==='"') q=true;
      else if(ch===","){row.push(cell);cell="";}
      else if(ch==="\n"){row.push(cell);rows.push(row);row=[];cell="";}
      else if(ch!=="\r") cell+=ch;
    }
  }
  row.push(cell);rows.push(row);
  return rows;
}
async function handleFile(file){

      const matrix=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{header:1,defval:""});

}

function createBinning(values,rows,analysis){
  const nums=values.map(x=>x.value).filter(v=>v!==null);
  if(!nums.length) return null;
  const max=Math.max(...nums),min=Math.min(...nums);
  const allInt=nums.every(v=>Number.isInteger(v));
  let defs;
  if(min>=0 && allInt && max<=100){
    defs=[
      {label:"0",test:v=>v===0},
      {label:"1-2",test:v=>v>=1&&v<=2},
      {label:"3-5",test:v=>v>=3&&v<=5},
      {label:"6-10",test:v=>v>=6&&v<=10},
      {label:"10以上",test:v=>v>10},
    ];
  }else{
    const sorted=[...nums].sort((a,b)=>a-b);
    const qs=[0,.2,.4,.6,.8,1].map(p=>sorted[Math.min(sorted.length-1,Math.floor((sorted.length-1)*p))]);
    defs=[];
    for(let i=0;i<5;i++){
      const lo=qs[i],hi=qs[i+1];
      if(i>0 && hi===qs[i-1]) continue;
      defs.push({label:i===0?`≤${hi.toFixed(2)}`:i===4?`>${lo.toFixed(2)}`:`${lo.toFixed(2)}-${hi.toFixed(2)}`,
        test:v=>i===0?v<=hi:(i===4?v>lo:(v>lo&&v<=hi))});
    }
  }
  const bins=defs.map(d=>({label:d.label,test:d.test,count:0,bad:0,good:0}));
  for(const item of values){
    const i=defs.findIndex(d=>d.test(item.value));
    if(i<0) continue;
    bins[i].count++;
    if(isBad(item.row,analysis)) bins[i].bad++;
    else if(isGood(item.row,analysis)) bins[i].good++;
  }
  const finalBins=bins.filter(b=>b.count>0);
  finalBins.forEach(b=>b.badRate=b.count?b.bad/b.count:0);
  const total=finalBins.reduce((s,b)=>s+b.count,0);
  const totalBad=finalBins.reduce((s,b)=>s+b.bad,0);
  return {varName:analysis.variableCol,bins:finalBins,total,totalBad,overallBadRate:total?pct(totalBad,total,4)/100:0};
}
function createCutoffRules(values,analysis){
  const nums=values.map(x=>x.value).filter(v=>v!==null);
  if(!nums.length||!analysis.totalBad) return [];
  const unique=[...new Set(nums.filter(v=>v>0))].sort((a,b)=>a-b);
  if(!unique.length) return [];
  const preferred=[1,2,3,5,8,10,15,20].filter(t=>unique.some(v=>v>=t)&&t<=Math.max(...unique));
  const thresholds=(preferred.length?preferred:unique.slice(0,8)).slice(0,8);
  let rules=thresholds.map(t=>{
    let hit=0,badHit=0,goodHit=0;
    for(const item of values){
      if(item.value>=t){
        hit++;
        if(isBad(item.row,analysis)) badHit++;
        else if(isGood(item.row,analysis)) goodHit++;
      }
    }
    const rej=pct(hit,analysis.total);
    const recall=pct(badHit,analysis.totalBad);
    const prec=pct(badHit,hit);
    const kill=pct(goodHit,analysis.totalGood);
    const score=recall*.55+prec*.35-rej*.1-kill*.45;
    return {rule:`${analysis.variableCol} ≥ ${t}`,t,rej,recall,prec,kill,score,level:"",verdict:"按上传数据计算"};
  }).filter(r=>r.rej>0);
  if(!rules.length) return [];
  const best=rules.reduce((a,b)=>b.score>a.score?b:a,rules[0]);
  rules=rules.map(r=>{
    if(r===best) return Object.assign(r,{level:"recommend",verdict:"综合效果最优，推荐复核"});
    if(r.kill>=10) return Object.assign(r,{level:"serious",verdict:"误杀率偏高，需谨慎"});
    return r;
  });
  return rules;
}
function calcIV(binning,analysis){
  if(!binning||!analysis.totalBad||!analysis.totalGood) return null;
  let iv=0;
  for(const b of binning.bins){
    const goodDist=(b.good+.5)/(analysis.totalGood+.5*binning.bins.length);
    const badDist=(b.bad+.5)/(analysis.totalBad+.5*binning.bins.length);
    const woe=Math.log(goodDist/badDist);
    iv+=(goodDist-badDist)*woe;
  }
  return Math.max(0,iv);
}
function calcKS(values,analysis){
  if(!analysis.totalBad||!analysis.totalGood) return null;
  const sorted=[...values].sort((a,b)=>b.value-a.value);
  let bad=0,good=0,ks=0;
  for(const item of sorted){
    if(isBad(item.row,analysis)) bad++;
    else if(isGood(item.row,analysis)) good++;
    ks=Math.max(ks,Math.abs(bad/analysis.totalBad-good/analysis.totalGood));
  }
  return ks;
}
function calcAUC(values,analysis){
  if(!analysis.totalBad||!analysis.totalGood) return null;
  const sorted=[...values].sort((a,b)=>a.value-b.value);
  let rank=1,sumBadRanks=0;
  for(let i=0;i<sorted.length;){
    let j=i+1;
    while(j<sorted.length&&sorted[j].value===sorted[i].value) j++;
    const avg=(rank+rank+(j-i)-1)/2;
    for(let k=i;k<j;k++) if(isBad(sorted[k].row,analysis)) sumBadRanks+=avg;
    rank+=j-i;i=j;
  }
  const auc=(sumBadRanks-analysis.totalBad*(analysis.totalBad+1)/2)/(analysis.totalBad*analysis.totalGood);
  return Math.max(0,Math.min(1,auc));
}
function calcPSI(values,binning){
  if(!binning||values.length<20) return null;
  const mid=Math.floor(values.length/2);
  const parts=[values.slice(0,mid),values.slice(mid)];
  const dist=part=>binning.bins.map(b=>{
    const c=part.filter(x=>b.test?b.test(x.value):false).length;
    return (c+.5)/(part.length+.5*binning.bins.length);
  });
  const a=dist(parts[0]),b=dist(parts[1]);
  return a.reduce((s,x,i)=>s+(b[i]-x)*Math.log(b[i]/x),0);
}
function metricStatus(metric,value){
  if(value===null||value===undefined||Number.isNaN(value)) return "warn";
  if(metric.key==="iv") return value>=.1?"good":(value>=.02?"warn":"crit");
  if(metric.key==="ks") return value>=.2?"good":(value>=.1?"warn":"crit");
  if(metric.key==="auc") return value>=.7?"good":(value>=.6?"warn":"crit");
  if(metric.key==="psi") return value<=.1?"good":(value<=.25?"warn":"crit");
  return "warn";
}
function createModelMetrics(values,binning,analysis){
  const iv=calcIV(binning,analysis);
  const ks=calcKS(values,analysis);
  const auc=calcAUC(values,analysis);
  const psi=calcPSI(values,binning);
  return [
    {key:"iv",name:"IV 值",value:iv,display:iv===null?"N/A":iv.toFixed(3),unit:"",advice:"IV≥0.1 可考虑入模",desc:"按上传数据分箱计算"},
    {key:"ks",name:"KS 值",value:ks,display:ks===null?"N/A":ks.toFixed(3),unit:"",advice:"KS≥0.2 可考虑入模",desc:"好坏客户累计分布最大差异"},
    {key:"auc",name:"AUC/ROC",value:auc,display:auc===null?"N/A":auc.toFixed(3),unit:"",advice:"AUC≥0.7 可考虑入模",desc:"以所选变量作为单变量评分"},
    {key:"psi",name:"稳定性 PSI",value:psi,display:psi===null?"N/A":(psi*100).toFixed(1),unit:psi===null?"":"%",advice:"PSI≤10% 稳定，>25% 需复核",desc:"按数据前后半段计算"},
  ].map(m=>Object.assign(m,{status:metricStatus(m,m.value)}));
}
function computeQuality(analysis,values,cutoffRules){
  const extCols=getExternalNumericColumns(analysis);
  let queryCount=0;
  if(analysis.queryFlagCol){
    queryCount=analysis.rows.filter(r=>truthyFlag(r[analysis.queryFlagCol])).length;
  }else{
    queryCount=values.filter(x=>x.value>0).length;
  }
  const hitCount=values.filter(x=>x.value>0).length;
  const best=cutoffRules.find(r=>r.level==="recommend")||cutoffRules[0];
  let falseReject=0;
  if(best){
    const goodRows=values.filter(x=>isGood(x.row,analysis));
    const killed=goodRows.filter(x=>x.value>=best.t).length;
    falseReject=pct(killed,goodRows.length);
  }
  let blank=0,cells=0,badNumericRows=0;
  for(const row of analysis.rows){
    let rowOk=true;
    for(const c of extCols){
      cells++;
      if(isBlank(row[c.name])){blank++;continue;}
      const n=toNumber(row[c.name]);
      if(n===null||n<0) rowOk=false;
    }
    if(!rowOk) badNumericRows++;
  }
  return {
    query:pct(queryCount,analysis.total),
    hit:pct(hitCount,queryCount||analysis.total),
    falseReject:+falseReject.toFixed(1),
    miss:pct(blank,cells),
    consist:pct(analysis.total-badNumericRows,analysis.total)
  };
}
function getAnalysis(){
  if(!validMapping()) return null;
  const rows=uploadedData.rows;
  const analysis={
    fileName:uploadedData.fileName,
    sheetName:uploadedData.sheetName,
    uploadedAt:uploadedData.uploadedAt,
    headers:uploadedData.headers,
    descriptions:uploadedData.descriptions||{},
    rows,
    yCol:state.mapping.yCol,
    badValue:state.mapping.badValue,
    queryFlagCol:state.mapping.queryFlagCol,
    variableCol:state.mapping.variableCol,
    total:rows.length
  };
  analysis.totalBad=rows.filter(r=>isBad(r,analysis)).length;
  analysis.totalGood=rows.filter(r=>isGood(r,analysis)).length;
  analysis.badPct=pct(analysis.totalBad,analysis.total);
  analysis.values=rows.map(row=>({row,value:toNumber(row[analysis.variableCol],0)})).filter(x=>x.value!==null);
  analysis.binning=createBinning(analysis.values,rows,analysis);
  analysis.cutoffRules=createCutoffRules(analysis.values,analysis);
  analysis.quality=computeQuality(analysis,analysis.values,analysis.cutoffRules);
  analysis.modelMetrics=createModelMetrics(analysis.values,analysis.binning,analysis);
  return analysis;
}
function syncStateFromAnalysis(){
  const a=getAnalysis();
  if(!a) return;
  state.totalN=a.total;
  state.badPct=a.badPct;
  state.quality=a.quality;
  state.dataMeta={fileName:a.fileName,sheetName:a.sheetName,rows:a.total,cols:a.headers.length,uploadedAt:a.uploadedAt};
}

function renderQualityMeters(){
  $("#quality-meters").innerHTML=QUALITY_METRICS.map(m=>{
    const v=state.quality[m.key];
    const st=statusOf(m,v);
    // zone boundaries for the track (always 0..100 display, warn & good thresholds)
    const lo=Math.min(m.warn,m.good), hi=Math.max(m.warn,m.good);
    const zPct=m.higherBetter
      ? `<div class="zone" style="width:${m.warn}%;background:var(--crit-soft)"></div><div class="zone" style="width:${m.good-m.warn}%;background:var(--warn-soft)"></div><div class="zone" style="width:${100-m.good}%;background:var(--good-soft)"></div>`
      : `<div class="zone" style="width:${m.good}%;background:var(--good-soft)"></div><div class="zone" style="width:${m.warn-m.good}%;background:var(--warn-soft)"></div><div class="zone" style="width:${100-m.warn}%;background:var(--crit-soft)"></div>`;
    const needlePos=Math.min(100,Math.max(0,v));
    return `<div class="meter-row" data-key="${m.key}">
      <div class="lbl">${m.name}<div style="font-size:10.5px;color:var(--muted);font-weight:500">${m.desc}</div></div>
      <div class="meter-track">${zPct}<div class="needle" style="left:${needlePos}%"></div></div>
      <input type="number" class="input-num" data-qkey="${m.key}" value="${v}" step="0.1">
      <div class="meter-val"><span class="chip ${st}">${statusLabel(st)}</span></div>
    </div>`;
  }).join("");
  $$('#quality-meters input[data-qkey]').forEach(inp=>inp.oninput=()=>{
    const k=inp.dataset.qkey,m=QUALITY_METRICS.find(x=>x.key===k);
    let v=+inp.value||0; state.quality[k]=v; save();
    const row=inp.closest(".meter-row");
    row.querySelector(".needle").style.left=Math.min(100,Math.max(0,v))+"%";
    const st=statusOf(m,v);
    row.querySelector(".meter-val").innerHTML=`<span class="chip ${st}">${statusLabel(st)}</span>`;
  });
}
function renderModelTiles(){
  // zone color scales: up = higher index better; down = higher index worse
  const up  =["var(--crit)","var(--warn)","var(--serious)","var(--good)"];
  const down=["var(--good)","var(--warn)","var(--serious)","var(--crit)"];
  $("#model-tiles").innerHTML=MODEL_METRICS.map(m=>{
    const t=m.thresholds;
    let zi=0;
    for(let i=0;i<t.length;i++){ if(m.value>=t[i]) zi=i+1; }
    zi=Math.min(zi,3);
    const zcolor=(m.higherBetter?up:down)[zi];
    const recommend = m.higherBetter ? m.value>=m.recAt : m.value<=m.recAt;
    const maxV=m.unit==="%"?30:(t[t.length-1]*1.4);
    const pos=Math.min(100,m.value/maxV*100);
    const tics=t.map(x=>`<div style="position:absolute;left:${Math.min(100,x/maxV*100)}%;top:0;bottom:0;width:1px;background:var(--axis);opacity:.5"></div>`).join("");
    return `<div class="tile">
      <div class="tlbl">${m.name}</div>
      <div class="tval" style="color:${zcolor}">${m.value}<span class="u">${m.unit}</span></div>
      <div style="position:relative;height:8px;margin:10px 0 4px;background:var(--surface-3);border-radius:99px;border:1px solid var(--hairline)">
        ${tics}<div style="position:absolute;left:0;top:0;bottom:0;width:${pos}%;background:${zcolor};border-radius:99px;opacity:.5"></div>
        <div style="position:absolute;left:${pos}%;top:-2px;bottom:-2px;width:3px;background:${zcolor};border-radius:2px;transform:translateX(-1px)"></div>
      </div>
      <div style="font-size:11.5px;color:${zcolor};font-weight:600;margin-bottom:6px">${m.zones[zi]}</div>
      <div class="chip ${recommend?'good':'warn'}" style="margin-bottom:6px">${recommend?'建议入模':'暂不建议'}</div>
      <div style="font-size:11px;color:var(--muted)">${m.advice}</div>
    </div>`;
  }).join("");
}

   CHARTS (inline SVG, validated palette, hover tooltips)

const SVGNS="http://www.w3.org/2000/svg";
function svgEl(n,a={}){const e=document.createElementNS(SVGNS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
function niceMax(v){if(v<=10)return 10;if(v<=20)return 20;if(v<=50)return 50;if(v<=60)return 60;if(v<=100)return 100;return Math.ceil(v/10)*10;}

function drawBinningChart(wrap){
  const bins=BINNING.bins;
  const W=720,H=320,pad={t:18,r:18,b:46,l:42};
  const plotW=W-pad.l-pad.r, plotH=H-pad.t-pad.b;
  const yMax=niceMax(Math.max(...bins.map(b=>b.badRate*100))*1.15);
  const yTicks=5;
  const bw=plotW/bins.length;
  const barW=Math.min(bw*0.5,46);
  const overall=BINNING.overallBadRate*100;

  const svg=svgEl("svg",{viewBox:`0 0 ${W} ${H}`,role:"img","aria-label":"坏客户率分箱趋势"});
  // gridlines + y ticks
  for(let i=0;i<=yTicks;i++){
    const val=yMax/yTicks*i; const y=pad.t+plotH-(val/yMax)*plotH;
    svg.appendChild(svgEl("line",{x1:pad.l,x2:pad.l+plotW,y1:y,y2:y,stroke:"var(--hairline)","stroke-width":1}));
    const t=svgEl("text",{x:pad.l-8,y:y+4,"text-anchor":"end","font-size":11,fill:"var(--muted)","font-family":"inherit"});t.textContent=val.toFixed(0)+"%";svg.appendChild(t);
  }
  // x labels + bars
  bins.forEach((b,i)=>{
    const cx=pad.l+bw*(i+0.5);
    const val=b.badRate*100; const bh=(val/yMax)*plotH; const by=pad.t+plotH-bh;
    const bar=svgEl("rect",{x:cx-barW/2,y:by,width:barW,height:bh,rx:4,ry:4,fill:"var(--c1)","data-i":i});
    svg.appendChild(bar);
    // value label at cap (selective: all 5, low count = acceptable)
    const lab=svgEl("text",{x:cx,y:by-7,"text-anchor":"middle","font-size":12,"font-weight":700,fill:"var(--ink)","font-family":"inherit"});lab.textContent=val.toFixed(1)+"%";svg.appendChild(lab);
    // x label
    const xl=svgEl("text",{x:cx,y:pad.t+plotH+20,"text-anchor":"middle","font-size":12,fill:"var(--ink-2)","font-family":"inherit"});xl.textContent=b.label;svg.appendChild(xl);
    const xl2=svgEl("text",{x:cx,y:pad.t+plotH+35,"text-anchor":"middle","font-size":10.5,fill:"var(--muted)","font-family":"inherit"});xl2.textContent=b.count.toLocaleString()+"条";svg.appendChild(xl2);
  });
  // overall reference line
  const oy=pad.t+plotH-(overall/yMax)*plotH;
  svg.appendChild(svgEl("line",{x1:pad.l,x2:pad.l+plotW,y1:oy,y2:oy,stroke:"var(--serious)","stroke-width":1.5,"stroke-dasharray":"5 4"}));
  const rl=svgEl("text",{x:pad.l+plotW,y:oy-6,"text-anchor":"end","font-size":11,fill:"var(--serious)","font-weight":600,"font-family":"inherit"});rl.textContent="整体坏客户率 "+overall.toFixed(1)+"%";svg.appendChild(rl);
  // axis title
  const at=svgEl("text",{x:14,y:pad.t+plotH/2,transform:`rotate(-90 14 ${pad.t+plotH/2})`,"text-anchor":"middle","font-size":11,fill:"var(--muted)","font-family":"inherit"});at.textContent="坏客户率";svg.appendChild(at);

  wrap.innerHTML="";
  wrap.appendChild(svg);
  attachBarTooltip(wrap,svg,bins,b=>`${BINNING.varName} · ${b.label}`,(b)=>[
    ["样本数",b.count.toLocaleString()+" 条"],
    ["坏客户数",b.bad.toLocaleString()+" 条"],
    ["坏客户率",(b.badRate*100).toFixed(1)+"%"],
    ["占比",(b.count/BINNING.total*100).toFixed(1)+"%"],
  ]);
}

function drawCutoffChart(wrap){
  const cats=CUTOFF_RULES.map(r=>"≥ "+r.t);
  const series=[
    {name:"拒绝率",color:"var(--c1)",values:CUTOFF_RULES.map(r=>r.rej),primary:true},
    {name:"召回率",color:"var(--c2)",values:CUTOFF_RULES.map(r=>r.recall)},
    {name:"精准率",color:"var(--c5)",values:CUTOFF_RULES.map(r=>r.prec)},
    {name:"误杀率",color:"var(--c6)",values:CUTOFF_RULES.map(r=>r.kill)},
  ];
  const W=720,H=340,pad={t:18,r:18,b:46,l:42};
  const plotW=W-pad.l-pad.r, plotH=H-pad.t-pad.b;
  const yMax=niceMax(Math.max(...series.flatMap(s=>s.values))*1.15);
  const yTicks=5; const gw=plotW/cats.length; const grpPad=gw*0.18;
  const barW=Math.min((gw-grpPad*2)/series.length,20);
  const yVals=Array.from({length:yTicks+1},(_,i)=>yMax/yTicks*i);

  const svg=svgEl("svg",{viewBox:`0 0 ${W} ${H}`,role:"img","aria-label":"拒绝线 Cutoff 分析"});
  yVals.forEach(val=>{const y=pad.t+plotH-(val/yMax)*plotH;
    svg.appendChild(svgEl("line",{x1:pad.l,x2:pad.l+plotW,y1:y,y2:y,stroke:"var(--hairline)","stroke-width":1}));
    const t=svgEl("text",{x:pad.l-8,y:y+4,"text-anchor":"end","font-size":11,fill:"var(--muted)","font-family":"inherit"});t.textContent=val.toFixed(0)+"%";svg.appendChild(t);
  });
  cats.forEach((c,gi)=>{
    const gx=pad.l+gw*gi;
    series.forEach((s,si)=>{
      const v=s.values[gi]; const bh=(v/yMax)*plotH; const by=pad.t+plotH-bh;
      const cx=gx+grpPad+ (barW+2)*si;
      const bar=svgEl("rect",{x:cx,y:by,width:barW,height:bh,rx:3,ry:3,fill:s.color,"data-g":gi,"data-s":si,opacity:s.primary?1:0.92});
      svg.appendChild(bar);
      // selective direct label: only 拒绝率 (primary)
      if(s.primary){const lab=svgEl("text",{x:cx+barW/2,y:by-6,"text-anchor":"middle","font-size":11,"font-weight":700,fill:"var(--ink)","font-family":"inherit"});lab.textContent=v.toFixed(1)+"%";svg.appendChild(lab);}
    });
    const xl=svgEl("text",{x:gx+gw/2,y:pad.t+plotH+20,"text-anchor":"middle","font-size":12,fill:"var(--ink-2)","font-family":"inherit"});xl.textContent="拒绝线 "+c;svg.appendChild(xl);
  });
  const at=svgEl("text",{x:14,y:pad.t+plotH/2,transform:`rotate(-90 14 ${pad.t+plotH/2})`,"text-anchor":"middle","font-size":11,fill:"var(--muted)","font-family":"inherit"});at.textContent="比率";svg.appendChild(at);

  wrap.innerHTML="";
  wrap.appendChild(svg);
  // legend
  const leg=h('<div class="legend"></div>');
  series.forEach(s=>leg.appendChild(h(`<div class="li"><span class="sw" style="background:${s.color}"></span>${s.name}</div>`)));
  wrap.appendChild(leg);

  attachGroupedTooltip(wrap,svg,cats,series);
}

function attachBarTooltip(wrap,svg,bins,titleFn,rowsFn){
  const tip=$("#tooltip");
  svg.addEventListener("mousemove",e=>{
    const t=e.target; if(t.tagName!=="rect"||!t.hasAttribute("data-i")){tip.style.opacity=0;return;}
    const i=+t.getAttribute("data-i");const b=bins[i];
    const r=wrap.getBoundingClientRect();const pr=svg.getBoundingClientRect();
    const x=(t.x.animVal.value+t.width.animVal.value/2)/720*pr.width;
    const y=(t.y.animVal.value)/340*pr.height;
    tip.innerHTML=`<b>${titleFn(b)}</b>`+rowsFn(b).map(([k,v])=>`<div class="tv"><span>${k}</span><b>${v}</b></div>`).join("");
    tip.style.left=(pr.left-r.left+x)+"px";tip.style.top=(pr.top-r.top+y)+"px";tip.style.opacity=1;
  });
  svg.addEventListener("mouseleave",()=>tip.style.opacity=0);
}
function attachGroupedTooltip(wrap,svg,cats,series){
  const tip=$("#tooltip");
  svg.addEventListener("mousemove",e=>{
    const t=e.target; if(t.tagName!=="rect"||t.getAttribute("data-g")===null){tip.style.opacity=0;return;}
    const gi=+t.getAttribute("data-g");
    const r=wrap.getBoundingClientRect();const pr=svg.getBoundingClientRect();
    const x=(t.x.animVal.value+t.width.animVal.value/2)/720*pr.width;
    const y=(t.y.animVal.value)/340*pr.height;
    let html=`<b>${cats[gi]}</b>`;
    series.forEach(s=>{html+=`<div class="tv"><span><i style="background:${s.color}"></i>${s.name}</span><b>${s.values[gi]}%</b></div>`;});
    tip.innerHTML=html;
    tip.style.left=(pr.left-r.left+x)+"px";tip.style.top=(pr.top-r.top+y)+"px";tip.style.opacity=1;
  });
  svg.addEventListener("mouseleave",()=>tip.style.opacity=0);
}

      cb.closest(".check").classList.toggle("checked",cb.checked);renderExtractTag();});

function renderSplit(){
  const a=getAnalysis();
  if(!a) return;
  const N=a.total,badPct=a.badPct,badN=a.totalBad,goodN=a.totalGood,grayN=Math.max(0,N-badN-goodN);
  const tiles=[
    {name:"好客户",val:goodN,min:3500},
    {name:"坏客户",val:badN,min:1000},
    {name:"灰/其他",val:grayN,min:0},
  ];
  $("#split-tiles").innerHTML=tiles.map(t=>{
    const ok=t.val>=t.min;
    return `<div class="tile"><div class="tlbl">${t.name}</div><div class="tval">${t.val.toLocaleString()}</div><div class="tdelta">${ok?`<span class="chip good">≥ ${t.min.toLocaleString()}</span>`:`<span class="chip crit">不足 ${t.min.toLocaleString()}</span>`}</div></div>`;
  }).join("");
  $("#n-chk").innerHTML = N>=5000 ? `<span class="chip good">充分性达标</span>` : `<span class="chip crit">尚缺 ${(5000-N).toLocaleString()} 条</span>`;
  $("#b-chk").innerHTML = badPct>=10 ? `<span class="chip good">分层性达标</span>` : `<span class="chip warn">建议提升至 10%+</span>`;
  const allOk = N>=5000 && badPct>=10 && badN>=1000 && goodN>=3500;
  $("#split-note").innerHTML = allOk
    ? `上传样本满足主要硬约束。当前坏样本 ${badN.toLocaleString()} 条，坏样本占比 ${badPct.toFixed(1)}%。`
    : `上传样本存在未满足项。若需调整，只能重新上传数据或修改字段映射。`;
}

function afterEval(){
  if(!validMapping()) return;
  const a=getAnalysis();
  syncStateFromAnalysis();
  renderQualityMeters(a);
  renderModelTiles(a);
  $("#binning-note").textContent=a.binning?`共 ${a.binning.total.toLocaleString()} 条样本进入分箱，整体坏客户率 ${(a.binning.overallBadRate*100).toFixed(1)}%。`:"所选变量没有可用数值，无法分箱。";
  drawBinningChart($("#binning-chart"),a.binning);
  drawCutoffChart($("#cutoff-chart"),a.cutoffRules);
  $("#cutoff-rows").innerHTML=a.cutoffRules.length?a.cutoffRules.map(r=>`<tr class="${r.level==='recommend'?'recommend':r.level==='serious'?'':''}"><td class="mono">${esc(r.rule)}</td><td class="num">${esc(r.t)}</td><td class="num">${r.rej}%</td><td class="num">${r.recall}%</td><td class="num">${r.prec}%</td><td class="num">${r.kill}%</td><td>${r.level==='recommend'?'<span class="chip good">推荐</span> ':''}${r.verdict}</td></tr>`).join(""):`<tr><td colspan="7">所选变量没有可用阈值，无法计算 Cutoff。</td></tr>`;
  save();
}
function renderQualityMeters(a=getAnalysis()){
  const q=a?a.quality:state.quality;
  $("#quality-meters").innerHTML=QUALITY_METRICS.map(m=>{
    const v=q[m.key]??0;
    const st=statusOf(m,v);
    const zPct=m.higherBetter
      ? `<div class="zone" style="width:${m.warn}%;background:var(--crit-soft)"></div><div class="zone" style="width:${m.good-m.warn}%;background:var(--warn-soft)"></div><div class="zone" style="width:${100-m.good}%;background:var(--good-soft)"></div>`
      : `<div class="zone" style="width:${m.good}%;background:var(--good-soft)"></div><div class="zone" style="width:${m.warn-m.good}%;background:var(--warn-soft)"></div><div class="zone" style="width:${100-m.warn}%;background:var(--crit-soft)"></div>`;
    const needlePos=Math.min(100,Math.max(0,v));
    return `<div class="meter-row" data-key="${m.key}">
      <div class="lbl">${m.name}<div style="font-size:10.5px;color:var(--muted);font-weight:500">${m.desc}</div></div>
      <div class="meter-track">${zPct}<div class="needle" style="left:${needlePos}%"></div></div>
      <div class="lock-val">${Number(v).toFixed(1)}%</div>
      <div class="meter-val"><span class="chip ${st}">${statusLabel(st)}</span></div>
    </div>`;
  }).join("");
}
function renderModelTiles(a=getAnalysis()){
  const metrics=a?a.modelMetrics:[];
  $("#model-tiles").innerHTML=metrics.map(m=>{
    const zcolor=m.status==="good"?"var(--good)":m.status==="warn"?"var(--warn)":"var(--crit)";
    const recommend=m.status==="good";
    const maxV=m.key==="auc"?1:(m.key==="psi" ? .3 : .5);
    const pos=m.value===null?0:Math.min(100,Math.abs(m.value)/maxV*100);
    return `<div class="tile">
      <div class="tlbl">${m.name}</div>
      <div class="tval" style="color:${zcolor}">${m.display}<span class="u">${m.unit}</span></div>
      <div style="position:relative;height:8px;margin:10px 0 4px;background:var(--surface-3);border-radius:99px;border:1px solid var(--hairline)">
        <div style="position:absolute;left:0;top:0;bottom:0;width:${pos}%;background:${zcolor};border-radius:99px;opacity:.5"></div>
      </div>
      <div class="chip ${recommend?'good':'warn'}" style="margin-bottom:6px">${recommend?'建议入模':'需复核'}</div>
      <div style="font-size:11px;color:var(--muted)">${m.advice}</div>
    </div>`;
  }).join("");
  if($("#model-note")&&a){
    const good=metrics.filter(m=>m.status==="good").length;
    $("#model-note").innerHTML=good>=3?`所选变量 <b>${esc(a.variableCol)}</b> 的主要指标达到入模观察门槛，建议结合现有模型相关性继续验证。`:`所选变量 <b>${esc(a.variableCol)}</b> 的部分指标未达门槛，建议更换变量或扩大样本后复核。`;
  }
}

function drawBinningChart(wrap,binning){
  if(!wrap) return;
  if(!binning||!binning.bins||!binning.bins.length){
    wrap.innerHTML='<div class="empty-state"><div class="et">无法生成分箱图</div><div>所选变量没有可用数值。</div></div>';
    return;
  }
  const bins=binning.bins;
  const W=720,H=320,pad={t:18,r:18,b:46,l:42};
  const plotW=W-pad.l-pad.r, plotH=H-pad.t-pad.b;
  const yMax=niceMax(Math.max(...bins.map(b=>b.badRate*100),1)*1.15);
  const yTicks=5,bw=plotW/bins.length,barW=Math.min(bw*0.5,46),overall=binning.overallBadRate*100;
  const svg=svgEl("svg",{viewBox:`0 0 ${W} ${H}`,role:"img","aria-label":"坏客户率分箱趋势"});
  for(let i=0;i<=yTicks;i++){
    const val=yMax/yTicks*i,y=pad.t+plotH-(val/yMax)*plotH;
    svg.appendChild(svgEl("line",{x1:pad.l,x2:pad.l+plotW,y1:y,y2:y,stroke:"var(--hairline)","stroke-width":1}));
    const t=svgEl("text",{x:pad.l-8,y:y+4,"text-anchor":"end","font-size":11,fill:"var(--muted)","font-family":"inherit"});t.textContent=val.toFixed(0)+"%";svg.appendChild(t);
  }
  bins.forEach((b,i)=>{
    const cx=pad.l+bw*(i+0.5),val=b.badRate*100,bh=(val/yMax)*plotH,by=pad.t+plotH-bh;
    svg.appendChild(svgEl("rect",{x:cx-barW/2,y:by,width:barW,height:bh,rx:4,ry:4,fill:"var(--c1)","data-i":i}));
    const lab=svgEl("text",{x:cx,y:by-7,"text-anchor":"middle","font-size":12,"font-weight":700,fill:"var(--ink)","font-family":"inherit"});lab.textContent=val.toFixed(1)+"%";svg.appendChild(lab);
    const xl=svgEl("text",{x:cx,y:pad.t+plotH+20,"text-anchor":"middle","font-size":12,fill:"var(--ink-2)","font-family":"inherit"});xl.textContent=b.label;svg.appendChild(xl);
    const xl2=svgEl("text",{x:cx,y:pad.t+plotH+35,"text-anchor":"middle","font-size":10.5,fill:"var(--muted)","font-family":"inherit"});xl2.textContent=b.count.toLocaleString()+"条";svg.appendChild(xl2);
  });
  const oy=pad.t+plotH-(overall/yMax)*plotH;
  svg.appendChild(svgEl("line",{x1:pad.l,x2:pad.l+plotW,y1:oy,y2:oy,stroke:"var(--serious)","stroke-width":1.5,"stroke-dasharray":"5 4"}));
  const rl=svgEl("text",{x:pad.l+plotW,y:oy-6,"text-anchor":"end","font-size":11,fill:"var(--serious)","font-weight":600,"font-family":"inherit"});rl.textContent="整体坏客户率 "+overall.toFixed(1)+"%";svg.appendChild(rl);
  const at=svgEl("text",{x:14,y:pad.t+plotH/2,transform:`rotate(-90 14 ${pad.t+plotH/2})`,"text-anchor":"middle","font-size":11,fill:"var(--muted)","font-family":"inherit"});at.textContent="坏客户率";svg.appendChild(at);
  wrap.innerHTML="";
  wrap.appendChild(svg);
  attachBarTooltip(wrap,svg,bins,b=>`${binning.varName} · ${b.label}`,(b)=>[
    ["样本数",b.count.toLocaleString()+" 条"],
    ["坏客户数",b.bad.toLocaleString()+" 条"],
    ["坏客户率",(b.badRate*100).toFixed(1)+"%"],
    ["占比",(b.count/binning.total*100).toFixed(1)+"%"],
  ]);
}
function drawCutoffChart(wrap,rules){
  if(!wrap) return;
  if(!rules||!rules.length){
    wrap.innerHTML='<div class="empty-state"><div class="et">无法生成 Cutoff 图</div><div>所选变量没有可用阈值。</div></div>';
    return;
  }
  const cats=rules.map(r=>"≥ "+r.t);
  const series=[
    {name:"拒绝率",color:"var(--c1)",values:rules.map(r=>r.rej),primary:true},
    {name:"召回率",color:"var(--c2)",values:rules.map(r=>r.recall)},
    {name:"精准率",color:"var(--c5)",values:rules.map(r=>r.prec)},
    {name:"误杀率",color:"var(--c6)",values:rules.map(r=>r.kill)},
  ];
  const W=720,H=340,pad={t:18,r:18,b:46,l:42};
  const plotW=W-pad.l-pad.r,plotH=H-pad.t-pad.b,yMax=niceMax(Math.max(...series.flatMap(s=>s.values),1)*1.15);
  const yTicks=5,gw=plotW/cats.length,grpPad=gw*0.18,barW=Math.min((gw-grpPad*2)/series.length,20);
  const svg=svgEl("svg",{viewBox:`0 0 ${W} ${H}`,role:"img","aria-label":"拒绝线 Cutoff 分析"});
  for(let i=0;i<=yTicks;i++){
    const val=yMax/yTicks*i,y=pad.t+plotH-(val/yMax)*plotH;
    svg.appendChild(svgEl("line",{x1:pad.l,x2:pad.l+plotW,y1:y,y2:y,stroke:"var(--hairline)","stroke-width":1}));
    const t=svgEl("text",{x:pad.l-8,y:y+4,"text-anchor":"end","font-size":11,fill:"var(--muted)","font-family":"inherit"});t.textContent=val.toFixed(0)+"%";svg.appendChild(t);
  }
  cats.forEach((c,gi)=>{
    const gx=pad.l+gw*gi;
    series.forEach((s,si)=>{
      const v=s.values[gi],bh=(v/yMax)*plotH,by=pad.t+plotH-bh,cx=gx+grpPad+(barW+2)*si;
      svg.appendChild(svgEl("rect",{x:cx,y:by,width:barW,height:bh,rx:3,ry:3,fill:s.color,"data-g":gi,"data-s":si,opacity:s.primary?1:.92}));
      if(s.primary){const lab=svgEl("text",{x:cx+barW/2,y:by-6,"text-anchor":"middle","font-size":11,"font-weight":700,fill:"var(--ink)","font-family":"inherit"});lab.textContent=v.toFixed(1)+"%";svg.appendChild(lab);}
    });
    const xl=svgEl("text",{x:gx+gw/2,y:pad.t+plotH+20,"text-anchor":"middle","font-size":12,fill:"var(--ink-2)","font-family":"inherit"});xl.textContent="拒绝线 "+c;svg.appendChild(xl);
  });
  const at=svgEl("text",{x:14,y:pad.t+plotH/2,transform:`rotate(-90 14 ${pad.t+plotH/2})`,"text-anchor":"middle","font-size":11,fill:"var(--muted)","font-family":"inherit"});at.textContent="比率";svg.appendChild(at);
  wrap.innerHTML="";
  wrap.appendChild(svg);
  const leg=h('<div class="legend"></div>');
  series.forEach(s=>leg.appendChild(h(`<div class="li"><span class="sw" style="background:${s.color}"></span>${s.name}</div>`)));
  wrap.appendChild(leg);
  attachGroupedTooltip(wrap,svg,cats,series);
}

VIEW_RENDERERS.report=()=>{
  if(!validMapping()) return `<h2 class="view-h">⑤ 测试报告</h2><p class="view-d">请先上传并映射外部数据。</p>${uploadRequiredHtml("data")}`;
  return `
<h2 class="view-h">⑤ 测试报告</h2>
<p class="view-d">依据文档六段式结构，自动汇总上传数据计算出的结论。可打印或导出 PDF（浏览器打印）。</p>
${dataBannerHtml()}
<div class="toolbar">
  <button class="btn primary" onclick="window.print()">打印 / 导出 PDF</button>
  <button class="btn" onclick="goto('eval')">返回效果评估</button>
</div>
<div id="print-area">${renderReport()}</div>`;
};
function renderReport(){
  const a=getAnalysis();
  if(!a) return uploadRequiredHtml("data");
  const q=a.quality,qGet=QUALITY_METRICS.find(m=>m.key==="query"),qs=statusOf(qGet,q.query);
  const recRule=a.cutoffRules.find(r=>r.level==="recommend")||a.cutoffRules[0];
  const goodModel=a.modelMetrics.filter(m=>m.status==="good").length;
  const grade=(qs==="good"&&q.consist>=95&&goodModel>=3)?"A（推荐采购）":(qs!=="crit"&&goodModel>=2?"B（建议小范围试用）":"C（暂不推荐）");
  return `<div class="report">
    <h2>外部数据测试报告</h2>
    <div class="meta">数据文件：${esc(a.fileName)} &nbsp;|&nbsp; 报告日期：${new Date().toLocaleDateString("zh-CN")} &nbsp;|&nbsp; 样本量：${a.total.toLocaleString()} 条</div>
    <h3>一、测试概述</h3>
    <div class="kv">
      <b>测试目的</b><span>评估外部数据在策略规则与评分模型中的应用价值</span>
      <b>标签口径</b><span>${esc(a.yCol)} = ${esc(a.badValue)} 识别为坏样本</span>
      <b>样本概况</b><span>共 ${a.total.toLocaleString()} 条，坏样本 ${a.totalBad.toLocaleString()} 条，占比 ${a.badPct.toFixed(1)}%</span>
      <b>核心变量</b><span class="mono">${esc(a.variableCol)}</span>
    </div>
    <h3>二、数据质量评估</h3>
    <table>
      <thead><tr><th>指标</th><th class="num">实测值</th><th class="num">标准</th><th>判定</th></tr></thead>
      <tbody>${QUALITY_METRICS.map(m=>{const st=statusOf(m,q[m.key]);return `<tr><td>${m.name}</td><td class="num">${q[m.key].toFixed(1)}%</td><td class="num">${m.std}</td><td>${statusLabel(st)}</td></tr>`;}).join("")}</tbody>
    </table>
    <p style="margin-top:8px">查得率 ${q.query.toFixed(1)}%（${statusLabel(qs)}），一致性率 ${q.consist.toFixed(1)}%，缺失率 ${q.miss.toFixed(1)}%。</p>
    <h3>三、核心变量分析</h3>
    <p>对核心变量 <span class="mono">${esc(a.variableCol)}</span> 进行分箱分析，整体坏客户率 ${a.binning?(a.binning.overallBadRate*100).toFixed(1):"N/A"}%。${a.binning&&a.binning.bins.length?`最高分箱坏客户率 ${(Math.max(...a.binning.bins.map(b=>b.badRate))*100).toFixed(1)}%。`:""}</p>
    <h3>四、策略规则评估</h3>
    ${recRule?`<table>
      <thead><tr><th>推荐规则</th><th class="num">拒绝率</th><th class="num">召回率</th><th class="num">精准率</th><th class="num">误杀率</th></tr></thead>
      <tbody><tr><td class="mono">${esc(recRule.rule)}</td><td class="num">${recRule.rej}%</td><td class="num">${recRule.recall}%</td><td class="num">${recRule.prec}%</td><td class="num">${recRule.kill}%</td></tr></tbody>
    </table>
    <p style="margin-top:8px">推荐拒绝线 <b>${esc(recRule.rule)}</b>，预计可拦截 ${recRule.recall.toFixed(1)}% 的坏客户，误杀优质客户 ${recRule.kill}%。</p>`:"<p>所选变量没有可用阈值，暂无法推荐拒绝线。</p>"}
    <h3>五、模型入模评估</h3>
    <table>
      <thead><tr><th>指标</th><th class="num">实测值</th><th>标准</th><th>结论</th></tr></thead>
      <tbody>${a.modelMetrics.map(m=>`<tr><td>${m.name}</td><td class="num">${m.display}${m.unit}</td><td>${m.advice}</td><td>${m.status==="good"?"建议入模":"需复核"}</td></tr>`).join("")}</tbody>
    </table>
    <h3>六、综合评估结论</h3>
    <div class="kv">
      <b>数据可用性评级</b><span><b style="font-size:16px">${grade}</b></span>
      <b>应用场景建议</b><span>作为策略前置规则识别高风险客群；达标后可作为评分模型候选变量继续验证</span>
      <b>采购决策建议</b><span>${grade.startsWith("A")?"建议正式采购并接入生产策略与模型验证":(grade.startsWith("B")?"建议先在灰度/小范围场景验证后再行决策":"建议要求供应商提升查得率、一致性或补充样本后复测")}</span>
    </div>
  </div>`;
}
