<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 设置</title>
<style>
:root{
  --bg:#f4f4f1;--surface:#fff;--surface-2:#f7f6f2;--ink:#101010;--muted:#6a6862;--line:#dedcd3;
  --brand:#2a78d6;--brand-ink:#1c5cab;--brand-soft:#eaf1fb;--good:#0ca30c;--warn:#a06b00;--crit:#c23b3b;
  --shadow:0 1px 2px rgba(16,24,40,.05),0 4px 12px rgba(16,24,40,.06);
  --radius:12px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
.shell{max-width:1240px;margin:0 auto;padding:24px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.title{font-size:22px;font-weight:750;margin:0}
.sub{font-size:13px;color:var(--muted);margin-top:4px}
.status{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--surface);font-size:12px;font-weight:700}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,minmax(0,1fr))}
.g3{grid-template-columns:repeat(3,minmax(0,1fr))}
@media(max-width:980px){.g2,.g3{grid-template-columns:1fr}}
label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.input,.select,.textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font-size:13px}
.textarea{min-height:96px;resize:vertical}
.input:focus,.select:focus,.textarea:focus{outline:2px solid var(--brand);border-color:var(--brand)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:13px;font-weight:700;cursor:pointer}
.btn:hover{background:var(--surface-2)}
.btn.primary{background:var(--brand);border-color:transparent;color:#fff}
.btn.primary:hover{background:var(--brand-ink)}
.btn.mini{padding:6px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.note{font-size:12px;color:var(--muted);background:var(--brand-soft);border:1px solid color-mix(in srgb,var(--brand) 18%,transparent);border-radius:8px;padding:10px 12px}
.error{background:#fbebeb;border-color:#f0c4c4;color:var(--crit)}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--muted)}
.muted{color:var(--muted)}
.spinner{width:14px;height:14px;border:2px solid #d8d8d8;border-top-color:var(--brand);border-radius:50%;display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 双栏布局 */
.config-layout{display:flex;gap:16px;align-items:flex-start}
.profile-rail{width:248px;flex:none;display:flex;flex-direction:column;gap:10px}
.editor-pane{flex:1;min-width:0}
.rail-h{display:flex;justify-content:space-between;align-items:center}
.rail-h .label{font-size:13px;font-weight:750}
.profile-card{position:relative;border:1px solid var(--line);border-radius:10px;background:#fff;padding:12px 14px;cursor:pointer;transition:background .12s,border-color .12s}
.profile-card:hover{background:var(--surface-2)}
.profile-card.editing{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.profile-card.active{border-color:var(--brand-ink)}
.pc-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.pc-name{font-weight:750;font-size:14px;display:flex;align-items:center;gap:6px;word-break:break-all}
.pc-star{color:var(--warn)}
.pc-model{font-size:12px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:#fff;text-transform:lowercase;flex:none}
.pc-actions{display:none;position:absolute;top:6px;right:6px;gap:4px}
.profile-card:hover .pc-actions,.profile-card.editing .pc-actions{display:inline-flex}
.pc-actions button{border:1px solid var(--line);background:#fff;border-radius:6px;width:24px;height:24px;font-size:12px;cursor:pointer;line-height:1;padding:0}
.pc-actions button:hover{background:var(--surface-2);border-color:var(--brand)}
.editor-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.editor-head .title2{font-size:16px;font-weight:750;display:flex;align-items:center;gap:8px}
.badge.active-badge{background:var(--brand-soft);color:var(--brand-ink);border-color:color-mix(in srgb,var(--brand) 25%,transparent)}
.key-wrap{position:relative}
.key-wrap .eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:none;background:transparent;cursor:pointer;font-size:14px;color:var(--muted);padding:4px;line-height:1}
.dirty-dot{color:var(--warn);font-weight:700}
@media(max-width:980px){
  .config-layout{flex-direction:column}
  .profile-rail{width:100%;flex-direction:row;overflow-x:auto;padding-bottom:6px}
  .rail-h{width:100%}
  .profile-card{min-width:190px;flex:none}
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1 class="title">API 设置</h1>
      <div class="sub">Profile 管理 · 请求地址、API Key、模型</div>
    </div>
    <div class="toolbar" style="margin:0">
      <button class="btn" type="button" onclick="window.location.href='chat.html'">AI 交互</button>
      <button class="btn" type="button" onclick="window.location.href='外部数据测试SOP工作台.html'">返回工作台</button>
      <span id="status" class="status">加载中</span>
    </div>
  </div>

  <div id="error"></div>

  <div class="config-layout">
    <aside class="profile-rail">
      <div class="rail-h">
        <span class="label">Profiles</span>
        <button class="btn mini" id="add_btn" type="button">+ 新增</button>
      </div>
      <div id="profile_list"></div>
    </aside>

    <div class="editor-pane">
      <div class="card">
        <div class="editor-head">
          <div class="title2">编辑:<span id="editing_name">zhipu</span><span id="editing_active_tag" class="badge active-badge" style="display:none">★ 当前生效</span></div>
          <button class="btn mini" id="activate_btn" type="button" style="display:none">设为当前生效</button>
        </div>
        <div class="grid g2">
          <div>
            <label>API 类型</label>
            <select id="api_type" class="select">
              <option value="anthropic">anthropic</option>
              <option value="openai">openai</option>
              <option value="openai-compatible">openai-compatible</option>
              <option value="zhipu">zhipu</option>
            </select>
          </div>
          <div>
            <label>模型</label>
            <input id="model" class="input" placeholder="glm-5.2">
          </div>
          <div>
            <label>请求地址</label>
            <input id="api_url" class="input" placeholder="https://.../chat/completions">
          </div>
          <div>
            <label>Base URL</label>
            <input id="base_url" class="input" placeholder="https://open.bigmodel.cn/api/paas/v4">
          </div>
          <div>
            <label>API Key</label>
            <div class="key-wrap">
              <input id="api_key" class="input" type="password" placeholder="your api key" style="padding-right:34px">
              <button type="button" id="key_eye" class="eye" title="显示/隐藏">👁</button>
            </div>
          </div>
          <div>
            <label>Auth Token</label>
            <input id="auth_token" class="input" placeholder="Bearer token">
          </div>
          <div>
            <label>超时(秒)</label>
            <input id="timeout_seconds" class="input" type="number" min="1" value="60">
          </div>
          <div>
            <label>Temperature</label>
            <input id="temperature" class="input" type="number" min="0" max="2" step="0.1" value="0.2">
          </div>
          <div>
            <label>Max tokens</label>
            <input id="max_tokens" class="input" type="number" min="1" value="4096">
          </div>
        </div>
        <div class="toolbar">
          <button id="save_btn" class="btn primary" type="button">保存配置</button>
          <button id="reload_btn" class="btn" type="button">刷新</button>
        </div>
        <div class="note">配置按 profile 保存到 <code>api_config.json</code>。内置 profile(anthropic / openai_compatible / zhipu)不可删除或重命名。对话测试请到「AI 交互」页。</div>
      </div>
    </div>
  </div>
</div>

<script>
const $=(s,p=document)=>p.querySelector(s);
const BUILTIN=["anthropic","openai_compatible","zhipu"];
const state={document:null,editing:"zhipu",active:"zhipu",dirty:false,showKey:false,loading:false,saving:false,error:""};

function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}

async function api(path,options={}){
  const resp=await fetch(path,options);
  const data=await resp.json().catch(()=>({ok:false,error:"后端返回非 JSON 响应"}));
  if(!resp.ok||data.ok===false) throw new Error(data.error||`HTTP ${resp.status}`);
  return data;
}

function isBuiltin(name){return BUILTIN.includes(name);}

function profileNames(){
  const profiles=state.document?.profiles||{};
  return Array.from(new Set([...BUILTIN,...Object.keys(profiles)])).filter(n=>n!=="ccswitch");
}

function refreshButtons(){
  const busy=state.loading||state.saving;
  ["save_btn","reload_btn","add_btn"].forEach(id=>{const el=$("#"+id);if(el)el.disabled=busy;});
}

function setBusy(flag,kind){
  if(kind==="save") state.saving=flag;
  else state.loading=flag;
  refreshButtons();
  renderStatus();
}

function showError(message){
  $("#error").innerHTML=message?`<div class="card error">${esc(message)}</div>`:"";
}

function renderStatus(){
  let txt=`生效: ${state.active||"-"}`;
  if(state.dirty) txt+='  <span class="dirty-dot">● 未保存</span>';
  $("#status").innerHTML=txt;
}

function renderRail(){
  const names=profileNames();
  const profiles=state.document?.profiles||{};
  $("#profile_list").innerHTML=names.map(name=>{
    const p=profiles[name]||{};
    const editing=name===state.editing;
    const active=name===state.active;
    const model=p.model||"(未设置模型)";
    const type=p.api_type||"-";
    const actions=isBuiltin(name)?"":`<span class="pc-actions">
      <button type="button" title="重命名" data-act="rename" data-name="${esc(name)}">✏</button>
      <button type="button" title="删除" data-act="delete" data-name="${esc(name)}">🗑</button>
    </span>`;
    return `<div class="profile-card${editing?" editing":""}${active?" active":""}" data-name="${esc(name)}">
      ${actions}
      <div class="pc-row">
        <span class="pc-name">${active?'<span class="pc-star">★</span>':''}${esc(name)}</span>
        <span class="pc-badge">${esc(type)}</span>
      </div>
      <div class="pc-model">${esc(model)}</div>
    </div>`;
  }).join("");
}

function renderEditorHead(){
  $("#editing_name").textContent=state.editing||"-";
  const isActive=state.editing===state.active;
  $("#editing_active_tag").style.display=isActive?"":"none";
  $("#activate_btn").style.display=isActive?"none":"";
}

function render(){
  renderRail();
  renderEditorHead();
  renderStatus();
}

function loadProfileToForm(name){
  const p=(state.document?.profiles||{})[name]||{};
  $("#api_type").value=p.api_type||"openai";
  $("#api_url").value=p.api_url||p.request_url||"";
  $("#base_url").value=p.base_url||"";
  $("#api_key").value=p.api_key||"";
  $("#auth_token").value=p.auth_token||"";
  $("#model").value=p.model||"";
  $("#timeout_seconds").value=p.timeout_seconds??60;
  $("#temperature").value=p.temperature??0.2;
  $("#max_tokens").value=p.max_tokens??4096;
  showError("");
}

function persistDraft(){
  if(!state.document) return;
  const profiles=state.document.profiles||(state.document.profiles={});
  if(!profiles[state.editing]) profiles[state.editing]={};
  const p=profiles[state.editing];
  p.api_type=$("#api_type").value;
  p.api_url=$("#api_url").value.trim();
  p.request_url=p.api_url;
  p.base_url=$("#base_url").value.trim();
  p.api_key=$("#api_key").value;
  p.auth_token=$("#auth_token").value.trim();
  p.model=$("#model").value.trim();
  p.timeout_seconds=Number($("#timeout_seconds").value||60);
  p.temperature=Number($("#temperature").value||0.2);
  p.max_tokens=Number($("#max_tokens").value||4096);
}

function selectProfile(name){
  if(!state.document||!name||name===state.editing) return;
  persistDraft();
  state.editing=name;
  loadProfileToForm(name);
  render();
}

function setActive(name){
  if(!state.document||!name||name===state.active) return;
  persistDraft();
  state.active=name;
  state.dirty=true;
  render();
}

function nameTaken(name){
  const profiles=state.document?.profiles||{};
  return name==="ccswitch"||BUILTIN.includes(name)||Object.prototype.hasOwnProperty.call(profiles,name);
}

function addProfile(){
  const name=(prompt("新 Profile 名称:")||"").trim();
  if(!name) return;
  if(nameTaken(name)){alert(`名称「${name}」不可用或已存在`);return;}
  persistDraft();
  const profiles=state.document.profiles||(state.document.profiles={});
  profiles[name]={api_type:"openai",api_url:"",base_url:"",api_key:"",auth_token:"",model:"",timeout_seconds:60,temperature:0.2,max_tokens:4096};
  state.editing=name;
  loadProfileToForm(name);
  state.dirty=true;
  render();
}

function renameProfile(old){
  const name=(prompt(`将「${old}」重命名为:`,old)||"").trim();
  if(!name||name===old) return;
  const profiles=state.document.profiles||{};
  const others={...profiles};delete others[old];
  const taken=name==="ccswitch"||BUILTIN.includes(name)||Object.prototype.hasOwnProperty.call(others,name);
  if(taken){alert(`名称「${name}」不可用或已存在`);return;}
  persistDraft();
  const content=profiles[old]||{};
  const ordered={};
  for(const k of Object.keys(profiles)){ordered[k===old?name:k]=k===old?content:profiles[k];}
  state.document.profiles=ordered;
  if(state.editing===old) state.editing=name;
  if(state.active===old) state.active=name;
  state.dirty=true;
  render();
}

function deleteProfile(name){
  if(isBuiltin(name)) return;
  if(!confirm(`确认删除 Profile「${name}」?该操作需保存后生效。`)) return;
  persistDraft();
  const profiles=state.document.profiles||{};
  delete profiles[name];
  const fallback=profileNames()[0]||"zhipu";
  if(state.active===name) state.active=fallback;
  if(state.editing===name){state.editing=fallback;loadProfileToForm(fallback);}
  state.dirty=true;
  render();
}

function collectDocument(){
  persistDraft();
  return {active:state.active,profiles:state.document?.profiles||{}};
}

function applyDocument(doc){
  state.document=doc||{active:"zhipu",profiles:{}};
  const names=profileNames();
  let active=state.document.active;
  if(!names.includes(active)) active=names[0]||"zhipu";
  state.active=active;
  state.editing=active;
  state.dirty=false;
  loadProfileToForm(active);
  render();
}

async function loadConfig(){
  setBusy(true);
  try{
    const data=await api("/api/config");
    applyDocument(data.document);
  }catch(err){
    showError(`读取配置失败:${err.message}`);
    $("#status").textContent="读取失败";
  }finally{
    setBusy(false);
  }
}

async function saveConfig(){
  showError("");
  setBusy(true,"save");
  try{
    const document=collectDocument();
    const data=await api("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({document})});
    applyDocument(data.document||document);
  }catch(err){
    showError(`保存失败:${err.message}`);
  }finally{
    setBusy(false,"save");
  }
}

function toggleKey(){
  state.showKey=!state.showKey;
  $("#api_key").type=state.showKey?"text":"password";
  $("#key_eye").textContent=state.showKey?"🙈":"👁";
}

function bindEvents(){
  $("#save_btn").addEventListener("click",saveConfig);
  $("#reload_btn").addEventListener("click",loadConfig);
  $("#add_btn").addEventListener("click",addProfile);
  $("#activate_btn").addEventListener("click",()=>setActive(state.editing));
  $("#key_eye").addEventListener("click",toggleKey);
  $("#profile_list").addEventListener("click",(e)=>{
    const actBtn=e.target.closest("[data-act]");
    if(actBtn){
      e.stopPropagation();
      const act=actBtn.dataset.act,name=actBtn.dataset.name;
      if(act==="rename") renameProfile(name);
      if(act==="delete") deleteProfile(name);
      return;
    }
    const card=e.target.closest(".profile-card");
    if(card) selectProfile(card.dataset.name);
  });
  ["api_type","api_url","base_url","api_key","auth_token","model","timeout_seconds","temperature","max_tokens"].forEach(id=>{
    $("#"+id).addEventListener("input",()=>{state.dirty=true;renderStatus();});
  });
  $("#api_type").addEventListener("change",()=>{state.dirty=true;renderStatus();renderRail();});
  window.addEventListener("beforeunload",(e)=>{if(state.dirty){e.preventDefault();e.returnValue="";}});
}

bindEvents();
loadConfig();
</script>
</body>
</html>
